services:
  # https://github.com/geigerzaehler/oidc-provider-mock
  idp-citizen:
    image: ghcr.io/geigerzaehler/oidc-provider-mock:latest
    container_name: idp-citizen.${COMPOSE_DOMAIN:?}
    networks:
      - app
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:?}-idp-citizen.rule=Host(`idp-citizen.${COMPOSE_DOMAIN:?}`)"
    expose:
      - "80"
    command: [
        "--port",
        "80",

        # https://oidc-provider-mock.readthedocs.io/stable/usage.html#predefined-users
        "--user-claims-file",
        "/app/user-claims.yaml",
      ]
    volumes:
      - idp-citizen-data:/app
    # https://docs.docker.com/reference/compose-file/services/#depends_on
    depends_on:
      idp-citizen-generate-user-claims:
        condition: service_completed_successfully

  # Generate user data for idp-citizen service
  idp-citizen-generate-user-claims:
    image: mikefarah/yq
    # We must run as root to allow the image to write the user claims into the shared volume (idp-citizen-data).
    user: root
    entrypoint: [
        sh,
        -c,
        'yq ''.[] | select(.persondata.status.status == (1, 3, 5, 7)) | [{
        "sub": key + ": " + .persondata.navn.personadresseringsnavn,
        "status": .persondata.status.status,
        "cpr": key,
        "aud": "client-id"
        }]'' /input/data.yaml > /app/user-claims.yaml',
      ]
    volumes:
      - idp-citizen-data:/app
      - ./${PERSON_LOOKUP_PATH:-web/modules/custom/itkdev_example_forms/modules/os2web_datalookup_mock/resources/PersonLookup.yaml}:/input/data.yaml

volumes:
  idp-citizen-data:
