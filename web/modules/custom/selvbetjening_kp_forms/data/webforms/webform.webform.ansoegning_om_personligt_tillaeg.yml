id: ansoegning_om_personligt_tillaeg
title: 'Ansøgning om personligt tillæg - SP501'
description: '<p><strong>Beskrivelse:</strong>&nbsp; Du kan søge om personligt tillæg, hvis du er folkepensionist eller modtager førtidspension efter de gamle regler, dvs. reglerne fra før 2003<br>&nbsp;<br><strong>Ejer:</strong>&nbsp;<br>&nbsp;<br><strong>Afdeling:</strong>&nbsp;Pension<br><br><strong>Postkasse:</strong>&nbsp;pension@msb.aarhus.dk<br>&nbsp;<br><strong>Direkte link:</strong>&nbsp;<br>&nbsp;<br><strong>Shortlink:</strong>&nbsp;<br>&nbsp;<br><strong>Henvisninger:&nbsp; </strong>SP501<br><br><strong>Sprog:</strong> Dansk</p>'
categories:
  - Ekstern
  - Fordelingskomponent
  - KP
  - Test
elements: "hvem_udfylder_ansoegningen:\n  '#type': webform_wizard_page\n  '#title': 'Hvem udfylder ansøgningen'\n  ansoegningsskema_til_praktik_og_loentilskudsportalen:\n    '#type': webform_section\n    '#title': 'Dine oplysninger '\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    oplysninger11:\n      '#type': fieldset\n      '#title': 'Ansøgning om personligt tillæg'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      '#format': container\n      markup_01:\n        '#type': webform_markup\n        '#markup': '<h3>Hvem udfylder ansøgningen</h3><p>Du skal på denne side, angive om du er ansøger eller om du repræsenterer en ansøger. Som partsrepræsentant er det et krav, at der vedhæftes en fuldmagt.<br>Som fuldmagt kan du vælge at bruge denne <a href=\"http://cdn.borgeronline.dk/borgeronline/FuldmagtHelbredstillaegPerson.pdf\" target=\"_blank\">skabelon</a> (nyt vindue).</p>'\n      jeg_udfylder_ansoegningen_som:\n        '#type': radios\n        '#title': 'Jeg udfylder ansøgningen som'\n        '#options':\n          'Ansøger, der ønsker at lave en ansøgning om personligt tillæg': 'Ansøger, der ønsker at lave en ansøgning om personligt tillæg'\n          'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger': 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n        '#required': true\n      markup_02:\n        '#type': webform_markup\n        '#states':\n          visible:\n            ':input[name=\"jeg_udfylder_ansoegningen_som\"]':\n              value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n        '#markup': '<p>Da du er logget ind med MitID, har du automatisk fået udfyldt en række personlige oplysninger, du skal afgive i forbindelse med ansøgning om personligt tillæg.<br>Du bør rette disse oplysninger, hvis der er noget, der ikke stemmer, og derefter fortsætte med ansøgning om personligt tillæg.</p>'\n      hvem_udfylder:\n        '#type': textfield\n        '#title': 'Hvem udfylder'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"jeg_udfylder_ansoegningen_som\"]':\n              value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n      fuldmagt_fuldmagthaverspersonnummer:\n        '#type': textfield\n        '#title': 'Fuldmagthavers personnummer'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"jeg_udfylder_ansoegningen_som\"]':\n              value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n      partsrep:\n        '#type': checkbox\n        '#title': 'Som partsrepræsentant erklærer jeg, at der foreligger en underskrevet fuldmagt, der vil blive vedhæftet som bilag '\n        '#help_title': Fuldmagt\n        '#help': '<p>Det er et krav, at der er udarbejdet og vedhæftet en fuldmagt til ansøgningen.<br><br>Ved at printe, udfylde og underskrive en begrænset fuldmagt, giver ansøgeren en partsrepræsentant (f.eks. en pårørende eller ven) tilladelse til at hjælpe med ansøgningen, men ikke automatisk fuldmagt til efterfølgende at handle på ansøgers vegne i den efterfølgende sagsbehandling. Det kræver en fuldmagt uden begrænsninger og ønskes dette, skal du kontakte kommunen, for yderligere information om denne mulighed.</p>'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"jeg_udfylder_ansoegningen_som\"]':\n              value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\noplysninger:\n  '#type': webform_wizard_page\n  '#title': 'Oplysninger om ansøger'\n  oplysninger1:\n    '#type': webform_section\n    '#title': 'Oplysninger om ansøger'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    oplysninger2:\n      '#type': fieldset\n      '#title': 'Oplysninger om ansøger'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_04:\n        '#type': webform_markup\n        '#markup': '<h3>Oplysninger om ansøger</h3>'\n      ansoegeroplysninger_ansoeger_fornavn:\n        '#type': os2forms_nemid_first_name\n        '#title': Fornavn\n        '#multiple': false\n        '#required': true\n      ansoegeroplysninger_ansoeger_mellemnavn:\n        '#type': os2forms_nemid_middle_name\n        '#title': Mellemnavn\n        '#multiple': false\n      ansoegeroplysninger_ansoeger_efternavn:\n        '#type': os2forms_nemid_last_name\n        '#title': Efternavn\n        '#multiple': false\n        '#required': true\n      ansoegeroplysninger_ansoeger_personnummer_cpr_:\n        '#type': os2forms_nemid_cpr\n        '#title': 'CPR nummer'\n        '#multiple': false\n        '#required': true\n      ansoeger_telefonnummer:\n        '#type': textfield\n        '#title': Telefonnummer\n      ansoeger_email:\n        '#type': textfield\n        '#title': Email\n      jeg_har_ikke_adresse_i_danmark:\n        '#type': checkbox\n        '#title': 'Jeg har ikke adresse i Danmark'\n      adresse:\n        '#type': webform_address\n        '#title': Adresse\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n        '#address_2__access': false\n        '#state_province__access': false\n        '#postal_code__title': 'Post nr'\n        '#country__access': false\n      telefonnummer:\n        '#type': tel\n        '#title': Telefonnummer\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresse1:\n        '#type': webform_address\n        '#title': Adresse\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n        '#state_province__access': false\n        '#postal_code__title': 'Post nr.'\n      jeg_har_ikke_adresse_i_danmark1:\n        '#type': fieldset\n        '#title': 'Jeg har ikke adresse i Danmark'\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;  '\n        markup_05:\n          '#type': webform_markup\n          '#states':\n            visible:\n              ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n                checked: true\n          '#markup': '<p>Du er registreret med en udenlandsk adresse, og du skal derfor benytte Ansøgning om personligt tillæg via Udbetaling Danmark. Du finder Udbetaling Danmark og yderligere vejledning på <a href=\"http://www.borger.dk/\" target=\"_blank\">borger.dk</a> (nyt vindue). Er du imidlertid flyttet til en dansk kommune, skal du rette dine adresseoplysninger og fortsætte med ansøgningen.</p>'\nsamlivsforhold_side:\n  '#type': webform_wizard_page\n  '#title': Samlivsforhold\n  samlivsforhold_farve:\n    '#type': webform_section\n    '#title': Samlivsforhold\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    samlivsforhold:\n      '#type': fieldset\n      '#title': Samlivsforhold\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_06:\n        '#type': webform_markup\n        '#markup': '<h3>Samlivsforhold</h3><p>Et personligt tillæg afgøres efter en konkret og individuel vurdering af din og evt. din ægtefælles økonomiske forhold. Du skal derfor oplyse om dit samlivsforhold og din boform.</p>'\n      ansoegningsoplysninger_civilstand:\n        '#type': radios\n        '#title': 'Oplys samlivsforhold '\n        '#help': '<h3><strong>Samlivsforhold</strong></h3><p>Du skal oplyse dit samlivsforhold. Er du tvivl om hvilken kategori, du skal vælge, kan du finde hjælp på <a href=\"https://www.borger.dk/pension-og-efterloen/Folkepension-oversigt\" target=\"_blank\">borger.dk</a> (nyt vindue) eller i pjecen, som kan findes <a href=\"https://www.borger.dk/pension-og-efterloen/Folkepension-oversigt\" target=\"_blank\">borger.dk</a> (nyt vindue) eller i pjecen, som kan findes <a href=\"http://star.dk/da/Om-STAR/Publikationer/2013/12/Enlig-eller-samlevende-pensionister.aspx\" target=\"_blank\">her</a> (nyt vindue).</p>'\n        '#options':\n          Enlig: Enlig\n          SamlevendeMedAegtefaelle: 'Samlevende med ægtefælle'\n          SamlevendeAndenPerson: 'Samlevende med en anden person'\n          SamlevendeSlaegtning: 'Samboende med slægtning, som jeg ikke kan indgå ægteskab med'\n        '#required': true\n      ansoegningsoplysninger_aegtefaellefornavn:\n        '#type': textfield\n        '#title': 'Ægtefælle Fornavn'\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: SamlevendeMedAegtefaelle\n        '#required': true\n      ansoegningsoplysninger_aegtefaellemellemnavn:\n        '#type': textfield\n        '#title': 'Ægtefælle Mellemnavn'\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: SamlevendeMedAegtefaelle\n      ansoegningsoplysninger_aegtefaelleefternavn:\n        '#type': textfield\n        '#title': 'Ægtefælle Efternavn'\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: SamlevendeMedAegtefaelle\n        '#required': true\n      ansoegningsoplysninger_aegtefaellepersonnummer:\n        '#type': textfield\n        '#title': 'Ægtefælle Personnummer'\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: SamlevendeMedAegtefaelle\n        '#required': true\n      aegtefaelle_samlever:\n        '#type': textfield\n        '#title': Samlever\n        '#required': true\n        '#states':\n          visible:\n            - ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n                value: SamlevendeAndenPerson\n            - or\n            - ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n                value: SamlevendeSlaegtning\n        '#name__title': 'Fulde navn'\n      ansoegningsoplysninger_boform:\n        '#type': radios\n        '#title': Boform\n        '#options':\n          Lejebolig: Lejebolig\n          Andelbolig: Andelsbolig\n          Ejerbolig: Ejerbolig\n        '#required': true\nudgiften_du_soeger_personligt_tillaeg_side:\n  '#type': webform_wizard_page\n  '#title': 'Udgiften du søger personligt tillæg til'\n  udgiften_du_soeger_personligt_tillaeg_farve:\n    '#type': webform_section\n    '#title': 'Udgiften du søger personligt tillæg til'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    udgiften_du_soeger_personligt_tillaeg_til:\n      '#type': fieldset\n      '#title': 'Udgiften du søger personligt tillæg til'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_07:\n        '#type': webform_markup\n        '#markup': '<h3>Udgiften du søger personligt tillæg til</h3><p>Et personligt tillæg kan dække udgifter, som kommunen vurderer er rimelige og nødvendige. Du skal derfor på denne side beskrive udgiften og det forventede beløb i kroner til at dække udgiften.<br>&nbsp;</p>'\n      udgift_kan_foldes_ud:\n        '#type': details\n        '#title': 'Udgift (Kan foldes ud)'\n        '#description': '<p>Her skal du skal kort beskrive, den udgift som du søger personligt tillæg til at få dækket. Det kan f.eks. være en udgift i forbindelse med flytning eller en egenbetaling i forbindelse med sundhedsbehandling, som du ikke selv kan afholde.<br>Hvis det er muligt, skal dokumentation i form af prisoverslag, tilbud mv. vedhæftes som bilag senere i forløbet.</p>'\n      markup_16:\n        '#type': webform_markup\n        '#markup': '<p><strong>Udgift</strong></p>'\n      ansoegningsoplysninger_formaal:\n        '#type': textfield\n        '#title': Formål\n        '#required': true\n      ansoegningsoplysninger_forventetudgiftformaal:\n        '#type': textfield\n        '#title': 'Forventet udgift (kr.)'\n        '#required': true\n      ansoegningsoplysninger_begrundelseansoegning:\n        '#type': textarea\n        '#title': 'Begrundelse for ansøgningen'\n        '#help': '<p>Her skal du give en mere uddybende begrundelse for din ansøgning, således kommunen kan vurdere, om udgiften er nødvendig og rimelig.</p>'\n        '#required': true\n      hvordan_oensker_du_at_dokumentere_din_udgift:\n        '#type': radios\n        '#title': 'Hvordan ønsker du at dokumentere din udgift?'\n        '#options':\n          'Jeg vil tilføje et bilag, der dokumenterer udgiften': 'Jeg vil tilføje et bilag, der dokumenterer udgiften'\n          'Jeg eftersender dokumentation': 'Jeg eftersender dokumentation'\n        '#required': true\n      jeg_eftersender_dokumentation:\n        '#type': fieldset\n        '#title': 'Jeg eftersender dokumentation'\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n              value: 'Jeg eftersender dokumentation'\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;  '\n        markup_08:\n          '#type': webform_markup\n          '#states':\n            visible:\n              ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n                value: 'Jeg eftersender dokumentation'\n          '#markup': '<p>Du har valgt at eftersende din dokumentation og skal derfor være opmærksom på, at der i din kommune kan være en tidsfrist for, hvornår dokumentationen skal være kommunen i hænde.<br>Du får besked om tidsfristen sammen med din kvittering for udfyldelse af formularen.<br>Modtager kommunen ikke din dokumentation rettidigt vil din ansøgning blive behandlet uden dokumentation og det vil øge sandsynligheden for, at du får et afslag.</p>'\naktuel_formue_side:\n  '#type': webform_wizard_page\n  '#title': 'Aktuel formue'\n  aktuel_formue_farve:\n    '#type': webform_section\n    '#title': 'Aktuel formue'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    aktuel_formue_mv:\n      '#type': fieldset\n      '#title': 'Aktuel formue mv.'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_09:\n        '#type': webform_markup\n        '#markup': '<h3>Aktuel formue mv.</h3><p>Du skal på denne side oplyse om din aktuelle formue, samt supplerende informationer. Oplysningerne vil indgå i den samlede vurdering af din økonomiske situation. Det er derfor vigtigt, at du medtager alle relevante oplysninger om din formue.</p><p>Skriv 0 i feltet, hvis du ikke har den aktuelle type af formue</p><p>&nbsp;</p><h5><strong>Ansøger (kr.)</strong></h5><table><thead>&nbsp;</thead></table>'\n      formueoplysninger_borgerformue_indestaaendepengeinstitut:\n        '#type': textfield\n        '#title': 'Indestående i pengeinstitutter mv.'\n        '#more_title': (kr.)\n        '#description_display': after\n        '#help_display': element_after\n        '#field_suffix': (kr.)\n        '#required': true\n      formueoplysninger_borgerformue_obligationer:\n        '#type': textfield\n        '#title': 'Obligationer (angiv kursværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n      formueoplysninger_borgerformue_pantebreve:\n        '#type': textfield\n        '#title': 'Pantebreve i depot (angiv kursværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n      formueoplysninger_borgerformue_aktier:\n        '#type': textfield\n        '#title': 'Aktier (deponerede og børsnoterede) og investeringsbeviser (angiv kursværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n      formueoplysninger_borgerformue_kontantbeholdning:\n        '#type': textfield\n        '#title': 'Kontantbeholding inkl. bankboks'\n        '#field_suffix': (kr.)\n        '#required': true\n      formueoplysninger_borgerformue_sommerhusfrivaerdi:\n        '#type': textfield\n        '#title': 'Sommerhus (angiv friværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n      formueoplysninger_borgerformue_uhaevetkapitalpension:\n        '#type': textfield\n        '#title': 'Uhævet kapitalpension'\n        '#field_suffix': (kr.)\n        '#required': true\n      kurs:\n        '#type': textfield\n        '#title': 'Andre værdipapirer - angiv art, fx værdipapirer i udlandet'\n        '#field_suffix': '(angiv kursværdi)'\n      formueoplysninger_borgerformue_andrevaerdipapirer:\n        '#type': textfield\n        '#title': Værdipapirer\n        '#title_display': invisible\n        '#field_suffix': (kr.)\n        '#required': true\n      formueoplysninger_borgerformue_nedsparingslaankreditfastejendom:\n        '#type': radios\n        '#title': 'Har du nedsparingslån eller nedsparingskassekredit med sikkerhed i fast ejendom'\n        '#help': '<h5><strong>Nedsparingsaftale</strong></h5><p>Har du eller din ægtefælle lavet en nedsparingsaftale med banken eller kreditforeningen, skal denne lånemulighed medregnes i den likvide formue, når der er tilknyttet en kassekredit med sikkerhed i friværdien i hus, ejerlejlighed eller sommerhus. En almindelig kassekredit uden sikkerhed i fast ejendom medregnes ikke som likvid formue.<br><br>Du skal oplyse det uudnyttede rådighedsbeløb, hvor hovedstolen er fratrukket det beløb, der er brugt.</p>'\n        '#options': yes_no\n        '#required': true\n      sygeforsikring:\n        '#type': radios\n        '#title': 'Er du medlem af Sygeforsikringen \"danmark\" '\n        '#help': '<h5><strong>Sygeforsikring \"danmark\"</strong></h5><p>Er du i tvivl om hvilken gruppe, du tilhører, kan du finde oplysningerne ved at logge på <a href=\"https://www.dit-danmark.dk/\" target=\"_blank\">dit-danmark.dk</a> (nyt vindue).</p>'\n        '#options': yes_no\n        '#required': true\n      sygeforsikring_gruppe:\n        '#type': radios\n        '#title': Gruppe\n        '#options':\n          GRUPPE_1: '1'\n          GRUPPE_2: '2'\n          GRUPPE_5: '5'\n          GRUPPE_E: E\n          GRUPPE_N: 'N'\n          GRUPPE_S: S\n          GRUPPE_BASIS: Basis\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"sygeforsikring\"]':\n              value: Ja\n      markup_09a:\n        '#type': webform_markup\n        '#markup': '<h5>&nbsp;</h5><h5>&nbsp;</h5><h5><strong>Ægtefælle (kr.)</strong>&nbsp;</h5><table><thead>&nbsp;</thead></table>'\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      formueoplysninger_aegtefaelleformue_indestaaendepengeinstitut:\n        '#type': textfield\n        '#title': 'Indestående i pengeinstitutter mv.'\n        '#more_title': (kr.)\n        '#description_display': after\n        '#help_display': element_after\n        '#field_suffix': (kr.)\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      formueoplysninger_aegtefaelleformue_obligationer:\n        '#type': textfield\n        '#title': 'Obligationer (angiv kursværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      formueoplysninger_aegtefaelleformue_pantebreve:\n        '#type': textfield\n        '#title': 'Pantebreve i depot (angiv kursværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      formueoplysninger_aegtefaelleformue_aktier:\n        '#type': textfield\n        '#title': 'Aktier (deponerede og børsnoterede) og investeringsbeviser (angiv kursværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      formueoplysninger_aegtefaelleformue_kontantbeholdning:\n        '#type': textfield\n        '#title': 'Kontantbeholding inkl. bankboks'\n        '#field_suffix': (kr.)\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      formueoplysninger_aegtefaelleformue_sommerhusfrivaerdi:\n        '#type': textfield\n        '#title': 'Sommerhus (angiv friværdi)'\n        '#field_suffix': (kr.)\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      formueoplysninger_aegtefaelleformue_uhaevetkapitalpension:\n        '#type': textfield\n        '#title': 'Uhævet kapitalpension'\n        '#field_suffix': (kr.)\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"ansoegningsoplysninger_civilstand\"]':\n              value: 'Samlevende med ægtefælle'\n      kurs1:\n        '#type': textfield\n        '#title': 'Andre værdipapirer - angiv art, fx værdipapirer i udlandet'\n        '#field_suffix': '(angiv kursværdi)'\n        '#states'