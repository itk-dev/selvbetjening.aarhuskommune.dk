: 'Samlevende med ægtefælle'\n      sygeforsikring_gruppe1:\n        '#type': radios\n        '#title': Gruppe\n        '#options':\n          GRUPPE_1: '1'\n          GRUPPE_2: '2'\n          GRUPPE_5: '5'\n          GRUPPE_E: E\n          GRUPPE_N: 'N'\n          GRUPPE_S: S\n          GRUPPE_BASIS: Basis\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"sygeforsikring\"]':\n              value: Ja\nindside:\n  '#type': webform_wizard_page\n  '#title': 'Alle aktuelle indtægter (efter skat og arbejdsmarkedsbidrag)'\n  indside1:\n    '#type': webform_section\n    '#title': 'Alle aktuelle indtægter (efter skat og arbejdsmarkedsbidrag)'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    indside2:\n      '#type': fieldset\n      '#title': 'Alle aktuelle indtægter (efter skat og arbejdsmarkedsbidrag)'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_10:\n        '#type': webform_markup\n        '#markup': '<h3>Alle aktuelle indtægter (efter skat og arbejdsmarkedsbidrag)</h3><p>Du skal på denne side oplyse om dine aktuelle indtægter efter skat og arbejdsmarkedsbidrag. Oplysningerne vil indgå i den samlede vurdering af din aktuelle økonomiske situation, og det er derfor vigtigt, at du medtager alle relevante oplysninger.</p><p>Skriv 0 i feltet, hvis du ikke har den aktuelle type af indtægt</p><p>&nbsp;</p><p>&nbsp;</p><h5><strong>Ansøger (kr. pr. måned)</strong></h5>'\n      aktuelleindtaegter_borgerindtaegter_loen:\n        '#type': textfield\n        '#title': Løn\n        '#field_suffix': 'Ansøger (kr. pr. måned)'\n        '#required': true\n      aktuelleindtaegter_borgerindtaegter_folkepensionfoertidspension:\n        '#type': textfield\n        '#title': Folkepension/førtidspension\n        '#field_suffix': 'Ansøger (kr. pr. måned)'\n        '#required': true\n      aktuelleindtaegter_b