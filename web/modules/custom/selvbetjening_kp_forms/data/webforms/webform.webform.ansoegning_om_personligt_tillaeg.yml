er dokumentation'\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;  '\n        markup_13:\n          '#type': webform_markup\n          '#markup': '<p>Du har valgt at eftersende din dokumentation og skal derfor være opmærksom på, at der i din kommune kan være en tidsfrist for, hvornår dokumentationen skal være kommunen i hænde.<br>Du får besked om tidsfristen sammen med din kvittering for udfyldelse af formularen.<br>Modtager kommunen ikke din dokumentation rettidigt vil din ansøgning blive behandlet uden dokumentation og det vil øge sandsynligheden for, at du får et afslag.</p>'\n      det_er_vigtigt_at_du_tjekker_din_dokumentation_inden_du_tilfoeje:\n        '#type': fieldset\n        '#title': 'Det er vigtigt, at du tjekker din dokumentation inden du tilføjer eller sender den ind, så følgende fremgår tydeligt og let læseligt: Hvilke udgifter det drejer sig om, den periode udgiften er for og beløbet.'\n        '#title_display': invisible\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;  '\n        markup_12:\n          '#type': webform_markup\n          '#markup': '<p>Det er vigtigt, at du tjekker din dokumentation inden du tilføjer eller sender den ind, så følgende fremgår tydeligt og let læseligt:<br>Hvilke udgifter det drejer sig om, den periode udgiften er for og beløbet.</p>'\nbemaerkning:\n  '#type': webform_wizard_page\n  '#title': Bemærkning\n  bemaerkning1:\n    '#type': webform_section\n    '#title': Bemærkning\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    bemaerkning2:\n      '#type': fieldset\n      '#title': Bemærkning\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_14:\n        '#type': webform_markup\n        '#markup': '<h3>Bemærkning</h3><p>Her kan du skrive supplerende bemærkninger, som du ønsker skal indgå i vurderingen af din ansøgning.</p>'\n      bemaerkninger:\n        '#type': textarea\n        '#title': Bemærkninger\nnyy_side:\n  '#type': webform_wizard_page\n  '#title': Erklæring\n  nyy_side1:\n    '#type': webform_section\n    '#title': Erklæring\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    nyy_side2:\n      '#type': fieldset\n      '#title': Erklæring\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_15:\n        '#type': webform_markup\n        '#markup': '<h3>Erklæring</h3><p>Inden at du på næste side underskriver og indsender ansøgningen, skal du på denne side erklære dig enig i de lovmæssige forudsætninger for at ansøge om personligt tillæg.</p>'\n      erklaering:\n        '#type': checkbox\n        '#title': 'Jeg kender mine rettigheder og pligter som angivet i afsnittet om behandling af personoplysninger og i vejledningen.'\n        '#required': true\n      underskriftsoplysninger_underskrift:\n        '#type': webform_signature\n        '#title': Underskrift\n        '#description': '<p>Sign above</p>'\n        '#required': true\n      underskriftsoplysninger_underskriftsdato:\n        '#type': date\n        '#title': 'Dato for underskrift'\n        '#required': true\n      se_afsnittet_om_behandling_af_personoplysninger_og_vejledningen:\n        '#type': details\n        '#title': 'Se afsnittet om behandling af personoplysninger og vejledningen her (Kan foldes ud)'\n        '#description': '<h5>Vejledning</h5><p><strong>Om personligt tillæg&nbsp;</strong></p><p>Personligt tillæg kan udbetales til pensionister, hvis økonomiske forhold er særlig vanskelige. Det vil sige, at du kan søge om personligt tillæg til nødvendige og rimelige udgifter, som du ikke selv har mulighed for at betale.&nbsp;</p><p>Det kan fx være helbredsbetingede udgifter, som ikke dækkes af helbredstillæg. Du kan også ansøge om personligt tillæg til andre udgifter. Har du ikke boet i Danmark hele dit liv, modtager du måske en lavere pension, en såkaldt brøkpension. Du kan så søge om personligt tillæg til at få dækket et ekstra behov for hjælp.&nbsp;</p><p>Du skal ansøge kommunen om personligt tillæg.</p><p>Kommunen afgør, om du har ret til et personligt tillæg efter en konkret og individuel vurdering af dine og din ægtefælles økonomiske forhold. I vurderingen indgår, om udgiften, du søger tilskud til, er nødvendig og rimelig. Samlevende skal ansøge om personligt tillæg hver for sig.&nbsp;</p><p>Når du søger om et personligt tillæg, skal du derfor oplyse om dine og din ægtefælles indtægter efter fradrag af skat, faste udgifter og størrelsen af den likvide formue.&nbsp;</p><p><strong>Sådan udfylder du skemaet&nbsp;</strong></p><p>Udfyld venligst skemaet linje for linje og send det til kommunen.&nbsp;</p><p>Oplysningerne skal være så aktuelle som muligt. Indtægter og udgifter skrives så vidt muligt i kr. pr. måned.&nbsp;</p><p>Skriv 0 i rubrikken, hvis du ikke har den indtægt eller udgift eller art formue, der spørges om.&nbsp;</p><p>Du skal ikke oplyse noget om almindelige leveomkostninger, fx udgifter til mad og drikke, tøj og sko, frisør, toiletartikler og andre dagligvarer, telefonsamtaler, fritidsaktviteter, aviser og blade.&nbsp;</p><p>Du kan få nærmere oplysninger om skemaet og praksis vedrørende personligt tillæg i kommunen.&nbsp;</p><p><strong>Husk </strong>at vedlægge dokumentation for alle aktuelle faste udgifter.&nbsp;</p><p>&nbsp;</p><h5>Rettigheder og pligter i forbindelse med kommunens behandling af personoplysninger</h5><p>Du bedes udfylde blanketten, for at kommunen kan behandle din henvendelse på et fyldestgørende grundlag, jf. retssikkerhedslovens § 11, stk. 1.&nbsp;</p><p>Når du modtager ydelser fra kommunen, har du pligt til at oplyse om ændringer, der kan have betydning for sagen. Det gælder både oplysninger vedrørende dig selv, en eventuel ægtefælle eller samlever og børn, jf. Retssikkerhedslovens § 11, stk. 2.&nbsp;</p><p>Forkerte eller manglende oplysninger kan medføre, at kommunen rejser krav om, at du tilbagebetaler ydelsen, jf. pensionslovens § 42.&nbsp;</p><p>Hvis du giver forkerte, mangelfulde eller vildledende oplysninger – enten bevidst eller ved grov uagtsomhed – kan du blive idømt bøde efter retssikkerhedslovens § 12b eller tiltales efter straffelovens § 289a.</p><p><strong>Oplysninger kommunen kan indhente uden dit samtykke</strong>&nbsp;</p><p>Kommunen kan indhente økonomiske oplysninger samt oplysninger om dine ferieforhold fra&nbsp;</p><p>• andre offentlige myndigheder,&nbsp;</p><p>• eIndkomstregistret,&nbsp;</p><p>• A-kasser og&nbsp;</p><p>• Feriekonto.&nbsp;</p><p>Kommunen kan indhente tilsvarende oplysninger om andre i din husstand.&nbsp;</p><p>Kommunen bruger oplysningerne til behandling af din sag eller til efterfølgende kontrol, jf. retssikkerhedslovens § 11a, stk. 2 til 5.&nbsp;</p><p>Kommunen har adgang til Udbetaling Danmarks oplysninger om dine og din ægtefælle/samlevers indtægt, personlig tillægsprocent og formue som er nødvendige for beregningen af personligt tillæg, jf. lov om Udbetaling Danmark, § 8, stk. 2.&nbsp;</p><p>Til kontrol af din indkomst- og formueforhold kan kommunen kræve nødvendige oplysninger fra pengeinstitutter og arbejdsgivere. Oplysningerne kan sammenstilles med de øvrige oplysninger om dine økonomiske forhold, som kommunen er i besiddelse af, jf. retssikkerhedslovens § 11a, stk. 3.&nbsp;</p><p>Kommunen har adgang til at foretage kontrolbesøg på den virksomhed, hvor du er eller har været ansat for at kontrollere de lønudbetalinger, som danner grundlag for [ydelse]. Ved besøget har kommunen ret til at udspørge dig og de øvrige ansatte iht. retssikkerhedslovens § 12a.</p><p>&nbsp;</p><p><strong>Kommunens registrering og videregivelse af oplysninger&nbsp;</strong></p><p>Kommunen registrerer de modtagne oplysninger og videregiver oplysningerne til andre offentlige myndigheder, private virksomheder m.fl., der har lovmæssigt krav på oplysningerne eller samarbejder med kommunen.&nbsp;</p><p>Kommunen og Udbetaling Danmark har gensidig pligt til, at videregive oplysninger som kan have betydning for en ydelse, du modtager fra henholdsvis Udbetaling Danmark og kommunen, jf. lov om Udbetaling Danmark, §§ 6, 9 og 10.&nbsp;</p><p>For at kunne afgøre om det er relevant at videregive oplysninger, har kommunen og Udbetaling Danmark adgang til at se hvilke ydelser, du har modtaget de sidste tre måneder, jf. lov om Udbetaling Danmark, § 8.&nbsp;</p><p>Kommunens oplysninger om dine kontante ydelser og tilskud sammenkøres i Udbetaling Danmarks dataenhed med andre myndigheders bevillinger og med oplysninger fra forskellige offentlige registre hos fx SKAT og Folkeregisteret, jf. lov om Udbetaling Danmark, kapitel 3a. Der sammenkøres data om økonomiske forhold samt bopæls- og familieforhold for dig, din ægtefælle/samlever og øvrige husstandsmedlemmer, både nuværende, tidligere og formodede. Formålet med samkøringen er at forhindre fejl i offentligt bevilligede udbetalinger.&nbsp;</p><p>Udbetaling Danmarks dataenhed videregiver oplysninger om formodede fejl eller urigtige data til kommunen, som derefter træffer afgørelse om din ydelse/tilskud skal reguleres, eller om der skal rejses krav om tilbagebetaling. Udbetaling Danmarks dataenhed sletter data om dig, når kommunen har fået besked om resultatet.&nbsp;</p><p>Kommunen sletter oplysningerne når opbevaringspligten udløber og et eventuelt arkiveringskrav er opfyldt. Når oplysningerne er arkiveret eller slettet, har kommunen ikke længere adgang til dem.&nbsp;</p><p>Du har ret til at vide, hvilke oplysninger kommunen har om dig, og du kan kræve forkerte oplysninger rettet eller slettet.&nbsp;</p><p>&nbsp;</p><p><strong>Kommunens databeskyttelsesrådgiver&nbsp;</strong></p><p>Du kan kontakte databeskyttelsesrådgiveren om dine rettigheder i henhold til databeskyttelseslovgivningen. Du har ret til at klage til Datatilsynet over Kommunens behandling af dine personlige oplysninger. På Datatilsynet.dk kan du læse mere om databeskyttelsesrådgiverens rolle. Rettigheder og pligter i forbindelse med kommunens behandling af personoplysninger</p>'\nnysidec:\n  '#type': webform_wizard_page\n  '#title': 'Bilag side'\n  nysidecc:\n    '#type': webform_section\n    '#title': sek\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    nysideccc:\n      '#type': fieldset\n      '#title': felt\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_03:\n        '#type': webform_markup\n        '#markup': \"<h3>Fuldmagt - Bilag</h3><p>På denne side medsender du bilag. Hvis du vil medsende yderligere bilag, kan du navngive det som 'Yderligere bilag'.</p><p><strong>Følgende bilag skal tilføjes:</strong><br>&nbsp;</p>\"\n      fuldmagt_fuldmagtdokumentnavn:\n        '#type': managed_file\n        '#title': 'Underskrevet fuldmagt for ansøger'\n        '#description_display': invisible\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"erklaering\"]':\n              checked: true\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': ' png, jpg, jpeg, docx, docm, pdf, PDF, doc, rtf, txt, xls, xlsx, ppt, pptx, csv, msg, tiff, ods, odt, gif, bmp, html, xml '\n      dokumentation_for_udgiften_der_soeges_om_personligt_tillaeg_til:\n        '#type': managed_file\n        '#title': 'Dokumentation for udgiften, der søges om personligt tillæg til'\n        '#description_display': invisible\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n              value: 'Jeg vil tilføje et bilag, der dokumenterer udgiften'\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': ' png, jpg, jpeg, docx, docm, pdf, PDF, doc, rtf, txt, xls, xlsx, ppt, pptx, csv, msg, tiff, ods, odt, gif, bmp, html, xml '\n      dokumentation_for_alle_aktuelle_faste_udgifter:\n        '#type': managed_file\n        '#title': 'Dokumentation for alle aktuelle faste udgifter'\n        '#description_display': invisible\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_dine_udgifter\"]':\n              value: 'Jeg vil tilføje bilag, der dokumenterer udgifterne'\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': ' png, jpg, jpeg, docx, docm, pdf, PDF, doc, rtf, txt, xls, xlsx, ppt, pptx, csv, msg, tiff, ods, odt, gif, bmp, html, xml '\n      hvis_du_vil_medsende_yderligere_bilag_kan_du_navngive_det_som_y:\n        '#type': managed_file\n        '#title': \"Hvis du vil medsende yderligere bilag, kan du navngive det som 'Yderligere bilag'. \"\n        '#description_display': invisible\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': ' png, jpg, jpeg, docx, docm, pdf, PDF, doc, rtf, txt, xls, xlsx, ppt, pptx, csv, msg, tiff, ods, odt, gif, bmp, html, xml '\n      jeg_bekraefter_hermed_at_jeg_har_vedhaeftet_alle_obligatoriske_b:\n        '#type': checkbox\n        '#title': 'Jeg bekræfter hermed at jeg har vedhæftet alle obligatoriske bilag.'\n        '#required': true\nkvittering:\n  '#type': os2forms_attachment\n  '#title': Kvittering\n  '#filename': Kvittering.pdf\n  '#export_type': pdf\n  '#digital_signature': 0\n  '#excluded_elements': {  }\n  '#exclude_empty': 0\n  '#exclude_empty_checkbox': 0"
