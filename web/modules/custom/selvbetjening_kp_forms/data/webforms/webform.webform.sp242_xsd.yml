     ':input[name=\"fuldmagt[Person]\"]':\n              checked: true\n      by3:\n        '#type': textfield\n        '#title': By\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Person]\"]':\n              checked: true\n      markup_14:\n        '#type': webform_markup\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n        '#markup': '<h3>Til virksomhed</h3>'\n      cvr_nummer1:\n        '#type': textfield\n        '#title': CVR-nummer\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n      p_nummer:\n        '#type': textfield\n        '#title': P-nummer\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n      navn3:\n        '#type': textfield\n        '#title': Navn\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n        '#required': true\n      vejnavn4:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n      husnummer4:\n        '#type': textfield\n        '#title': Husnummer\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"bfuldmagt[Virksomhed]\"]':\n              checked: true\n      etage4:\n        '#type': textfield\n        '#title': Etage\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n      side_doer4:\n        '#type': textfield\n        '#title': Side/Dør\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n      postnummer4:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n      by4:\n        '#type': textfield\n        '#title': By\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"fuldmagt[Virksomhed]\"]':\n              checked: true\n      markup_17:\n        '#type': webform_markup\n        '#markup': '<p><strong>Erklæring</strong></p>'\n      partsrepraesentan:\n        '#type': checkbox\n        '#title': 'Som partsrepræsentant erklærer jeg, at der foreligger en underskrevet fuldmagt, der vil blive vedhæftet som bilag'\n        '#states':\n          visible:\n            ':input[name=\"jeg_udfylder_anmodningen_som\"]':\n              value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n      markup_15:\n        '#type': webform_markup\n        '#markup': '<h3>Fuldmagtens omfang</h3><p>Fuldmagten giver tilladelse til, at partsrepræsentanten må hjælpe mig med at få udfyldt, signeret (med partsrepræsentants NemID) og indsendt:</p>'\n      ansoegning_om:\n        '#type': radios\n        '#title': 'Ansøgning om'\n        '#title_display': invisible\n        '#options':\n          'Ansøgning om Helbredstillæg': 'Ansøgning om Helbredstillæg'\n          'Ansøgning om Udvidet Helbredstillæg': 'Ansøgning om Udvidet Helbredstillæg'\n          'Ansøgning om Personligt tillæg': 'Ansøgning om Personligt tillæg'\n          'Anmodning om refusion i forbindelse med udgifter til behandling': 'Anmodning om refusion i forbindelse med udgifter til behandling'\n        '#required': true\n      markup_16:\n        '#type': webform_markup\n        '#markup': '<p>Denne fuldmagt er begrænset og er ikke en tilladelse til at handle på mine vegne i den efterfølgende sagsbehandling og dialog med kommunen.&nbsp;</p><h3>Ikrafttrædelse og tilbagekaldelse</h3><p>Fuldmagten gælder fra den dato, jeg har underskrevet, og dækker alene den konkrete tilhørende ansøgning/anmodning.</p>'\n      fuldmagt_dato:\n        '#type': date\n        '#title': Dato\n        '#required': true\n      fuldmagt_underskrift:\n        '#type': webform_signature\n        '#title': Underskrift\n        '#description': '<p>Sign above</p>'\n        '#required': true\noplysninger_om_ansoeger:\n  '#type': webform_wizard_page\n  '#title': 'Oplysninger om ansøger'\n  oplysninger_om_ansoeger1:\n    '#type': webform_section\n    '#title': 'Oplysninger om ansøger'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    oplysninger_om_ansoeger2:\n      '#type': fieldset\n      '#title': 'Oplysninger om ansøger'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_07:\n        '#type': webform_markup\n        '#markup': '<h3>Oplysninger om ansøger</h3>'\n      jeg_har_ikke_adresse_i_danmark:\n        '#type': checkbox\n        '#title': 'Jeg har ikke adresse i Danmark'\n      vejnavn:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      husnummer:\n        '#type': textfield\n        '#title': Husnummer\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n        '#required': true\n      etage:\n        '#type': textfield\n        '#title': Etage\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      side_doer:\n        '#type': textfield\n        '#title': Side/Dør\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      postnummer:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      by:\n        '#type': textfield\n        '#title': By\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      telefonnummer:\n        '#type': textfield\n        '#title': Telefonnummer\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_1:\n        '#type': textfield\n        '#title': 'Adresselinje 1'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_2:\n        '#type': textfield\n        '#title': 'Adresselinje 2'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_3:\n        '#type': textfield\n        '#title': 'Adresselinje 3'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_4:\n        '#type': textfield\n        '#title': 'Adresselinje 4'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_5:\n        '#type': textfield\n        '#title': 'Adresselinje 5'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      du_er_registreret_med_en_udenlandsk_adresse_og_du_skal_derfor_be:\n        '#type': fieldset\n        '#title': 'Du er registreret med en udenlandsk adresse, og du skal derfor benytte Anmodning om refusion i forbindelse med udgifter til behandling via Udbetaling Danmark. Du finder Udbetaling Danmark og yderligere vejledning på borger.dk (nyt vindue). Er du imidlertid flyttet til en dansk kommune, skal du rette dine adresseoplysninger og fortsætte med ansøgningen.'\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;max-width: 500px;'\n        markup_04:\n          '#type': webform_markup\n          '#markup': '<p>Du er registreret med en udenlandsk adresse, og du skal derfor benytte Anmodning om refusion i forbindelse med udgifter til behandling via Udbetaling Danmark. Du finder Udbetaling Danmark og yderligere vejledning på <a href=\"http://www.borger.dk/\" target=\"_blank\">borger.dk</a> (nyt vindue). Er du imidlertid flyttet til en dansk kommune, skal du rette dine adresseoplysninger og fortsætte med ansøgningen.</p>'\ntilskud:\n  '#type': webform_wizard_page\n  '#title': Tilskud\n  tilskud1:\n    '#type': webform_section\n    '#title': Tilskud\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    tilskud2:\n      '#type': fieldset\n      '#title': Tilskud\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_18:\n        '#type': webform_markup\n        '#markup': '<h3>Tilskud til<br>&nbsp;</h3>'\n      udvidethelbredstillaeg:\n        '#type': radios\n        '#title': 'Jeg søger om tilskud til nødvendig udgift til'\n        '#options':\n          Tandprotese: Tandprotese\n          Briller: Briller\n          Fodbehandling: Fodbehandling\n        '#required': true\n      tandprotese:\n        '#type': fieldset\n        '#title': Tandprotese\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"udvidethelbredstillaeg\"]':\n              value: 'Tandprotese '\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_19:\n          '#type': webform_markup\n          '#markup': '<h5><strong>Tandprotese</strong></h5><p>Der kan ydes helbredstillæg til dækning af udgiften til den billigste (men tilstrækkelige) aftagelige tandprotese. Der kan ydes helbredstillæg til dækning af de udgifter, der indgår i behandlingsforløbet (fx beslibning af eksisterende tænder) og således ikke alene til selve protesen. Ligeledes er udgiften til aftagelige tandproteser i form af duplikering og rebasering omfattet.<br><br>Udgifter til faste tandproteser (herunder faste proteser, der er led i behandlingen med en aftagelig protese) er således ikke selvstændigt omfattet af de udvidede regler for helbredstillæg, men der ydes helbredstillæg beregnet i forhold til prisen på den aftagelige tandprotese, der alternativt ville være nødvendig. Det drejer sig bl.a. om fastcementerede tandkroner, fastcementerede broer og implantater.<br><br>Hvis du ønsker en fast protese, kan der således udbetales helbredstillæg, der svarer til dækningen af den type aftagelige protese, som er vurderet nødvendig.<br><br>Der vil efter en konkret individuel vurdering kunne udbetales personlige tillæg til dækning af merudgiften ved en fast protese, såfremt kommunen vurderer, at det er nødvendigt.</p>'\n      briller:\n        '#type': fieldset\n        '#title': Briller\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"udvidethelbredstillaeg\"]':\n              value: 'Briller '\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_20:\n          '#type': webform_markup\n          '#markup': '<h5><strong>Briller</strong></h5><p>Der kan ydes helbredstillæg til dækning af udgiften til en standardbrille (stel og glas). Der ydes tillæg til permanente briller, der afhjælper nær- eller langsynethed (herunder bygningsfejl), evt. med indbygget læsebrille, men ikke til briller med glidende overgang (progressive glas) eller kontaktlinser.<br><br>Almindelige læsebriller er ikke omfattet, da de kan erhverves meget billigt uden en optikers mellemkomst. Dog vil der kunne ydes tillæg til læsebriller med en styrkeforskel mellem glassene på mindst 1 dioptri og/eller en bygningsfejl på mindst 1 dioptri eller mere på mindst et øje, da disse briller kun kan købes ved optiker. Udgifter til eventuel overflade- eller refleksbehandling m.v. indgår ikke i den tilskudsberettigede udgift.<br><br>Hvis du ønsker kontaktlinser i stedet for briller, skal tilskuddet beregnes i forhold til en standardbrille af tilsvarende styrke.<br><br>Hvis du ønsker briller med glidende overgang, skal tilskuddet beregnes i forhold til en standardbrille med indbygget læsebrille.</p>'\n      fodbehandling:\n        '#type': fieldset\n        '#title': Fodbehandling\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"udvidethelbredstillaeg\"]':\n              value: Fodbehandling\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_21:\n          '#type': webform_markup\n          '#markup': '<h5><strong>Fodbehandling</strong></h5><p>Der kan ydes helbredstillæg til vedvarende fodbehandling til pensionister, som ikke har en funktionsnedsættelse, men som alligevel har behov for fodbehandling, og til pensionister med funktionsnedsættelse, som har brug for fodbehandling, der ligger ud over den behandling, der kan varetages af hjemmeplejen.<br><br>Det er et krav, at det drejer sig om fodbehandling, der ikke kan ydes tilskud til efter sundhedslovens kapitel 15, og at fodbehandlingen ikke kan dækkes efter servicelovens § 83 om personlig pleje, enten på grund af behovets særlige karakter eller fordi pensionisten ikke har nedsat funktionsevne.<br><br>Der kan ikke ydes tilskud til fodbehandling, som du selv kan varetage.</p>'\n      hvorfor_er_behandlingen_noedvendig:\n        '#type': textarea\n        '#title': 'Hvorfor er behandlingen nødvendig?'\n        '#states':\n          visible:\n            ':input[name=\"udvidethelbredstillaeg\"]':\n              value: Fodbehandling\n      har_du_sukkersyge_nedgroede_negle_med_boejle_svaer_ledegigt_elle:\n        '#type': radios\n        '#title': 'Har du sukkersyge, nedgroede negle med bøjle, svær ledegigt eller arvæv efter strålebehandling?'\n        '#options': yes_no\n        '#states':\n          visible:\n            ':input[name=\"udvidethelbredstillaeg\"]':\n              value: Fodbehandling\n      hvordan_oensker_du_at_dokumentere_din_udgift:\n        '#type': radios\n        '#title': 'Hvordan ønsker du at dokumentere din udgift?'\n        '#options':\n          'Jeg vil tilføje et bilag, der dokumenterer udgiften': 'Jeg vil tilføje et bilag, der dokumenterer udgiften'\n          'Jeg eftersender dokumentation': 'Jeg eftersender dokumentation'\n        '#required': true\n      dokumenter_overslag:\n        '#type': managed_file\n        '#title': Overslag\n        '#multiple': 10\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n              value: 'Jeg vil tilføje et bilag, der dokumenterer udgiften'\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': 'png, jpg, jpeg, docx, docm, pdf, PDF, doc, rtf, txt, xls, xlsx, ppt, pptx, csv, msg, tiff, ods, odt, gif, bmp, html, xml, mp4'\n      dokumenter_faktura:\n        '#type': managed_file\n        '#title': Faktura\n        '#multiple': 10\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n              value: 'Jeg vil tilføje et bilag, der dokumenterer udgiften'\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': 'jpg jpeg png pict txt pdf doc docx'\n      dokumenter_bilag:\n        '#type': managed_file\n        '#title': Bilag\n        '#multiple': 10\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n              value: 'Jeg vil tilføje et bilag, der dokumenterer udgiften'\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': 'jpg jpeg png pict txt pdf doc docx'\n      jeg_bekraefter_hermed_at_jeg_har_vedhaeftet_alle_obligatoriske_b:\n        '#type': checkbox\n        '#title': 'Jeg bekræfter hermed at jeg har vedhæftet alle obligatoriske bilag.'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n              value: 'Jeg vil tilføje et bilag, der dokumenterer udgiften'\n      du_har_valgt_at_eftersende_din_dokumentation_og_skal_derfor_vaer:\n        '#type': fieldset\n        '#title': 'Du har valgt at eftersende din dokumentation og skal derfor være opmærksom på, at der i din kommune kan være en tidsfrist for, hvornår dokumentationen skal være kommunen i hænde. Du får besked om tidsfristen sammen med din kvittering for udfyldelse af formularen. Modtager kommunen ikke din dokumentation rettidigt vil din ansøgning blive behandlet uden dokumentation og det vil øge sandsynligheden for, at du får et afslag.'\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"hvordan_oensker_du_at_dokumentere_din_udgift\"]':\n              value: 'Jeg eftersender dokumentation'\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;max-width: 500px;'\n        markup_22:\n          '#type': webform_markup\n          '#markup': '<p>Du har valgt at eftersende din dokumentation og skal derfor være opmærksom på, at der i din kommune kan være en tidsfrist for, hvornår dokumentationen skal være kommunen i hænde.<br>Du får besked om tidsfristen sammen med din kvittering for udfyldelse af formularen.<br>Modtager kommunen ikke din dokumentation rettidigt vil din ansøgning blive behandlet uden dokumentation og det vil øge sandsynligheden for, at du får et afslag.</p>'\naktuel_formue_mv:\n  '#type': webform_wizard_page\n  '#title': 'Aktuel formue mv.'\n  aktuel_formue_mv1:\n    '#type': webform_section\n    '#title': 'Aktuel formue mv.'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    aktuel_formue_mv2:\n      '#type': fieldset\n      '#title': 'Aktuel formue mv.'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_30:\n        '#type': webform_markup\n        '#markup': '<h3>Aktuel formue mv.</h3>'\n      sygeforsikring:\n        '#type': radios\n        '#title': 'Er du medlem af Sygeforsikringen \"danmark\"'\n        '#options': yes_no\n        '#required': true\n      sygeforsikring_gruppe:\n        '#type': select\n        '#title': Gruppe\n        '#options':\n          GRUPPE_1: 'Gruppe 1'\n          GRUPPE_2: 'Gruppe 2'\n          GRUPPE_5: 'Gruppe 5'\n          GRUPPE_E: 'Gruppe E'\n          GRUPPE_N: 'Gruppe N'\n          GRUPPE_S: 'Gruppe S'\n          GRUPPE_BASIS: 'Gruppe Basis'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"er_du_medlem_af_sygeforsikringen_danmark\"]':\n              value: Ja\n      for_at_kunne_afgoere_din_ansoegning_om_udvidet_helbredstillaeg_s:\n        '#type': fieldset\n        '#title': \"For at kunne afgøre din ansøgning om udvidet helbredstillæg, skal kommunen bruge en opgørelse over din og din ægtefælles/samlevers aktuelle formue. Udbetaling Danmark træffer afgørelse om de aktuelle formueforhold og sender dem til kommunen. Du skal derfor oplyse om din formue via Udbetaling Danmark's selvbetjeningsløsning (der linkes til denne, når ansøgningen her er afsluttet)\"\n        '#title_display': invisible\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_23:\n          '#type': webform_markup\n          '#markup': \"<p>For at kunne afgøre din ansøgning om udvidet helbredstillæg, skal kommunen bruge en opgørelse over din og din ægtefælles/samlevers aktuelle formue. Udbetaling Danmark træffer afgørelse om de aktuelle formueforhold og sender dem til kommunen. Du skal derfor oplyse om din formue via Udbetaling Danmark's selvbetjeningsløsning (der linkes til denne, når ansøgningen her er afsluttet)</p>\"\nbemaerkning:\n  '#type': webform_wizard_page\n  '#title': Bemærkning\n  bemaerkning1:\n    '#type': webform_section\n    '#title': Bemærkning\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    bemaerkning2:\n      '#type': fieldset\n      '#title': Bemærkning\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_24:\n        '#type': webform_markup\n        '#markup': '<h3>Bemærkning</h3>'\n      her_kan_du_skrive_supplerende_bemaerkninger_som_du_oensker_skal:\n        '#type': fieldset\n        '#title': 'Her kan du skrive supplerende bemærkninger, som du ønsker skal indgå i vurderingen af din ansøgning.'\n        '#title_display': invisible\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_25:\n          '#type': webform_markup\n          '#markup': '<p>Her kan du skrive supplerende bemærkninger, som du ønsker skal indgå i vurderingen af din ansøgning.</p>'\n      bemaerkninger:\n        '#type': textarea\n        '#title': Bemærkninger\nside:\n  '#type': webform_wizard_page\n  '#title': Samtykke\n  sektion:\n    '#type': webform_section\n    '#title': sektion\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    feltgruppe:\n      '#type': fieldset\n      '#title': feltgruppe\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      overskrift:\n        '#type': webform_markup\n        '#markup': '<h3>Samtykke</h3>'\n      feltgruppea:\n        '#type': fieldset\n        '#title': 'Som en del af din ansøgning, skal du give samtykke til at kommunen kan udveksle oplysninger med din behandler.'\n        '#title_display': invisible\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_26:\n          '#type': webform_markup\n          '#markup': '<p>Som en del af din ansøgning, skal du give samtykke til at kommunen kan udveksle oplysninger med din behandler.</p>'\n      samtykke:\n        '#type': checkbox\n        '#title': 'Jeg (ansøger) giver samtykke til, at kommunen kan tage kontakt til den konkrete behandler (tandlæge/tandtekniker/ fodplejer/fodterapeut eller optiker) for eventuel afklaring.'\n        '#required': true\n      markup_27:\n        '#type': webform_markup\n        '#markup': '<p>Du kan tilbagekalde et samtykke til indhentning/videregivelse af oplysninger, jf. databeskyttelsesforordningens artikel 7, stk. 3.</p>'\nside1:\n  '#type': webform_wizard_page\n  '#title': Erklæring\n  sektion1:\n    '#type': webform_section\n    '#title': Erklæring\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    feltgruppe2:\n      '#type': fieldset\n      '#title': Erklæring\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_33:\n        '#type': webform_markup\n        '#markup': '<h3>Erklæring</h3>'\n      inden_at_du_paa_naeste_side_underskriver_og_indsender_ansoegning:\n        '#type': fieldset\n        '#title': 'Inden at du på næste side underskriver og indsender ansøgningen, skal du på denne side erklære dig enig i de lovmæssige forudsætninger for at ansøge om udvidet helbredstillæg.'\n        '#title_display': invisible\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_28:\n          '#type': webform_markup\n          '#markup': '<p>Inden at du på næste side underskriver og indsender ansøgningen, skal du på denne side erklære dig enig i de lovmæssige forudsætninger for at ansøge om udvidet helbredstillæg.</p>'\n      markup_29:\n        '#type': webform_markup\n        '#markup': '<p>Du bedes besvare alle relevante spørgsmål, idet dette vil lette kommunens behandling af din henvendelse, jf. retssikkerhedslovens § 11, stk. 1.<br>Dine oplysninger om Samlivsforhold og Aktuel formue fremsendes til Udbetaling Danmark, da det er Udbetaling Danmark, der skal opgøre din likvide formue.<br>Efter retssikkerhedslovens § 11, stk. 2, har du pligt til straks at underrette kommunen om enhver ændring i din personlige og økonomiske forhold, som kan medføre en ændring af helbredstillægget. Du kan vælge at gøre dette via Udbetaling Danmarks digitale løsning på Borger.dk.<br>Forkerte eller manglende oplysninger kan medføre tilbagebetaling, jf. pensionslovens § 42 eller førtidspensionslovens § 42.<br>Hvis du giver forkerte, mangelfulde eller vildledende oplysninger – enten bevidst eller ved grov uagtsomhed – kan du blive idømt bøde efter retssikkerhedslovens § 12b eller tiltales efter straffelovens § 289a.</p><p><strong>Oplysninger kommunen kan indhente uden dit samtykke</strong><br>Kommunen kan indhente økonomiske oplysninger samt oplysninger om dine ferieforhold fra<br>• andre offentlige myndigheder,<br>• eIndkomstregistret,<br>• A-kasser og<br>• Feriekonto.<br>Kommunen kan indhente tilsvarende oplysninger om andre i din husstand.<br>Kommunen bruger oplysningerne til behandling af din sag eller til efterfølgende kontrol, jf. retssikkerhedslovens § 11a, stk. 2 til 5 eller Integrationslovens § 50, stk. 5 og 6.<br>Kommunen har adgang til Udbetaling Danmarks oplysninger om dine og din ægtefælle/samlevers indtægt, personlig tillægsprocent og formue som er nødvendige for beregningen af helbredstillæg og personligt tillæg, jf. lov om Udbetaling Danmark, § 8, stk. 2.<br>Til kontrol af dine indkomst- og formueforhold kan kommunen kræve nødvendige oplysninger fra pengeinstitutter og arbejdsgivere. Oplysningerne kan sammenstilles med de øvrige oplysninger om dine økonomiske forhold, som kommunen er i besiddelse af, jf. retssikkerhedslovens § 11a, stk. 3</p><p><strong>Kommunens registrering og videregivelse af oplysninger</strong><br>Kommunen registrerer de modtagne oplysninger og videregiver oplysningerne til andre offentlige myndigheder, private virksomheder m.fl., der har lovmæssigt krav på oplysningerne eller samarbejder med kommunen.<br>Kommunen kan videregive oplysning om tilskuddets størrelse til behandleren.<br>Kommunen og Udbetaling Danmark har gensidig pligt til, at videregive oplysninger som kan have betydning for en ydelse, du modtager fra henholdsvis Udbetaling Danmark og kommunen, jf. lov om Udbetaling Danmark, §§ 6, 9 og 10.<br>For at kunne afgøre om det er relevant at videregive oplysninger, har kommunen og Udbetaling Danmark adgang til at se hvilke ydelser, du har modtaget de sidste tre måneder, jf. lov om Udbetaling Danmark, § 8.<br>Kommunens oplysninger om dine kontante ydelser og tilskud sammenkøres i Udbetaling Danmarks dataenhed med andre myndigheders bevillinger og med oplysninger fra forskellige offentlige registre hos fx SKAT og Folkeregisteret, jf. lov om Udbetaling Danmark, kapitel 3a. Der sammenkøres data om økonomiske forhold samt bopæls- og familieforhold for dig, din ægtefælle/samlever og øvrige husstandsmedlemmer, både nuværende, tidligere og formodede. Formålet med samkøringen er at forhindre fejl i offentligt bevilligede udbetalinger.<br>Udbetaling Danmarks dataenhed videregiver oplysninger om formodede fejl eller urigtige data til kommunen, som derefter træffer afgørelse om din ydelse/tilskud skal reguleres, eller om der skal rejses krav om tilbagebetaling. Udbetaling Danmarks dataenhed sletter data om dig, når kommunen har fået besked om resultatet.<br>Kommunen sletter oplysningerne når opbevaringspligten udløber og et eventuelt arkiveringskrav er opfyldt. Når oplysningerne er arkiveret eller slettet, har kommunen ikke længere adgang til dem.<br>Du har ret til at vide, hvilke oplysninger kommunen har om dig, og du kan kræve forkerte oplysninger rettet eller slettet.</p><p><strong>Kommunens databeskyttelsesrådgiver</strong><br>Du kan kontakte databeskyttelsesrådgiveren om dine rettigheder i henhold til databeskyttelseslovgivningen.<br>Du har ret til at klage til Datatilsynet over Kommunens behandling af dine personlige oplysninger.<br>På <a href=\"https://www.datatilsynet.dk/forside\" target=\"_blank\">datatilsynet.dk</a> (nyt vindue) kan du læse mere om databeskyttelsesrådgiverens rolle.</p>'\n      erklaering:\n        '#type': checkbox\n        '#title': 'Jeg kender mine rettigheder og pligter som angivet i afsnittet herover'\n        '#required': true\nsideb:\n  '#type': webform_wizard_page\n  '#title': Underskrift\n  sektionb:\n    '#type': webform_section\n    '#title': sektion\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    feltgruppeb:\n      '#type': fieldset\n      '#title': feltgruppe\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_34:\n        '#type': webform_markup\n        '#markup': '<h3>Underskrift</h3>'\n      underskriftsoplysninger_underskriftsdato:\n        '#type': date\n        '#title': Dato\n        '#required': true\n      underskriftsoplysninger_underskrift:\n        '#type': webform_signature\n        '#title': 'Underskriv herunder'\n        '#description': ''\n        '#description_display': invisible\n        '#required': true\nkvittering:\n  '#type': os2forms_attachment\n  '#title': Kvittering\n  '#filename': Kvittering.pdf\n  '#export_type': pdf\n  '#digital_signature': 0\n  '#excluded_elements': {  }\n  '#exclude_empty': 0\n  '#exclude_empty_checkbox': 0\nactions:\n  '#type': webform_actions\n  '#title': 'Send knap(per)'\n  '#states':\n    invisible:\n      ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n        checked: true"
