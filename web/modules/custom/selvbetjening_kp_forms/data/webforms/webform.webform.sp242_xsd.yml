        titel: 'Ansøgning om udvidet helbredstillæg (SP242)'
        beskrivelse: 'Se https://rimi-itk.github.io/digitaliseringskataloget.dk/digitaliseringskataloget.dk/sf1415/0.6/Integrationsbeskrivelse_SF1415.pdf#page=14 for at finde formulartype mm.'
      distribution_object:
        distribution_type: FORMULAR
