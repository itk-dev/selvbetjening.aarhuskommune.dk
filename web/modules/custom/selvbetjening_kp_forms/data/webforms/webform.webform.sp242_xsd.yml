          filspecifikation: UdvidetHelbredstillægAnsøgningBilag_1
          recipient_it_system_look_up: 1
          recipient_it_system: ''
          recipient_authority_override: 0
          recipient_authority: ''
        xml_template: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\r\n\r\n<SP242>\r\n  {# module://os2forms_fordelingskomponent/resources/SP/SF2900_XSD/SP242.xsd #}\r\n\r\n  {% macro personnummer(value) -%}\r\n  {{ 'urn:oio:cpr:%010d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro telefonnummer(value) -%}\r\n  {{ '%08d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro date(value) -%}\r\n  {{ value|date('Y-m-d') }}\r\n  {%- endmacro %}\r\n\r\n  <Header>\r\n    <Myndighed>urn:oio:cvr-nr:{{ handler.settings.sender.sender_id }}</Myndighed>\r\n    <ModtagetDato>{{ _self.date(submission.completed) }}</ModtagetDato>\r\n    <KLE>{{ handler.settings.distribution_context.kle_emne }}</KLE>\r\n    {% for file in files.dokumenter_overslag|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Overslag</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n    {% for file in files.dokumenter_faktura|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Faktura</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n    {% for file in files.dokumenter_bilag|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Bilag</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n  </Header>\r\n\r\n  <AnsoegerOplysninger>\r\n    <Ansoeger>\r\n      <Fornavn>{{ submission.data.ansoegeroplysninger_ansoeger_fornavn|trim }}</Fornavn>\r\n      {% if submission.data.ansoegeroplysninger_ansoeger_mellemnavn|default(false) %}\r\n      <Mellemnavn>{{ submission.data.ansoegeroplysninger_ansoeger_mellemnavn|trim }}</Mellemnavn>\r\n      {% endif %}\r\n      <Efternavn>{{ submission.data.ansoegeroplysninger_ansoeger_efternavn|trim }}</Efternavn>\r\n      <Personnummer>{{ _self.personnummer(submission.data.ansoegeroplysninger_ansoeger_personnummer_cpr_) }}</Personnummer>\r\n      {% if submission.data.ansoeger_telefonnummer|default(false) %}\r\n      <Telefonnummer>{{ _self.telefonnummer(submission.data.ansoeger_telefonnummer) }}</Telefonnummer>\r\n      {% endif %}\r\n    </Ansoeger>\r\n  </AnsoegerOplysninger>\r\n\r\n  <UdvidetHelbredstillaeg>{{ submission.data.udvidethelbredstillaeg|trim }}</UdvidetHelbredstillaeg>\r\n\r\n  {% if submission.data.sygeforsikring == 'Ja' %}\r\n  <Sygeforsikring>\r\n    <Gruppe>{{ submission.data.sygeforsikring_gruppe|upper }}</Gruppe>\r\n  </Sygeforsikring>\r\n  {% endif %}\r\n\r\n  <Underskriftsoplysninger>\r\n    <Underskrift>{{ submission.data.ansoegeroplysninger_ansoeger_fornavn }}{% if submission.data.ansoegeroplysninger_ansoeger_mellemnavn|default(false) %} {{ submission.data.ansoegeroplysninger_ansoeger_mellemnavn }}{% endif %} {{ submission.data.ansoegeroplysninger_ansoeger_efternavn }}</Underskrift>\r\n    <Underskriftsdato>{{ _self.date(submission.data.underskriftsoplysninger_underskriftsdato) }}</Underskriftsdato>\r\n  </Underskriftsoplysninger>\r\n\r\n  <Samtykke>Accepteret</Samtykke>\r\n\r\n  <Erklaering>Accepteret</Erklaering>\r\n\r\n  {% if submission.data.fuldmagt is not empty %}\r\n  {# @todo #}\r\n  <Fuldmagt>\r\n    <FuldmagtDokumentnavn>{{ submission.data.fuldmagt_for_og_mellemnavn_e1|trim }} {{ submission.data.fuldmagt_efternavn|trim }}</FuldmagtDokumentnavn>\r\n    <FuldmagthaversPersonnummer>{{ _self.personnummer(submission.data.fuldmagt_undertegnedepersonnummer) }}</FuldmagthaversPersonnummer>\r\n  </Fuldmagt>\r\n  {% endif %}\r\n\r\n</SP242>\r\n"
        xsd_url: 'module://os2forms_fordelingskomponent/resources/SP/SF2900_XSD/SP242.xsd'
