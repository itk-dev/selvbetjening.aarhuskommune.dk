id: sp242_xsd
title: 'SP242 - XSD'
description: "<p>Andreas' forsøg på at lave XSD til en yaml</p>"
categories:
  - Fordelingskomponent
  - Test
elements: "start:\n  '#type': webform_wizard_page\n  '#title': Oplysninger\n  ansoegeroplysninger:\n    '#type': webform_section\n    '#title': 'Dine oplysninger '\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    ansoeger:\n      '#type': fieldset\n      '#title': Oplysninger\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      '#format': container\n      ansoegeroplysninger_ansoeger_fornavn:\n        '#type': os2forms_nemid_first_name\n        '#title': Fornavn\n        '#multiple': false\n        '#readonly': true\n        '#required': true\n      ansoegeroplysninger_ansoeger_mellemnavn:\n        '#type': os2forms_nemid_middle_name\n        '#title': Mellemnavn\n        '#multiple': false\n        '#readonly': true\n      ansoegeroplysninger_ansoeger_efternavn:\n        '#type': os2forms_nemid_last_name\n        '#title': Efternavn\n        '#multiple': false\n        '#readonly': true\n        '#required': true\n      ansoegeroplysninger_ansoeger_personnummer_cpr_:\n        '#type': os2forms_nemid_cpr\n        '#title': 'CPR nummer'\n        '#multiple': false\n        '#readonly': true\n        '#required': true\n      ansoeger_telefonnummer:\n        '#type': textfield\n        '#title': Telefonnummer\n        '#pattern': \\d+\n      markup_31:\n        '#type': webform_markup\n        '#markup': '<h3>Info</h3><p><strong>Hvem kan søge om udvidet helbredstillæg?</strong><br>Hvis du opfylder de krav, som er listet op nedenfor, kan du bruge denne selvbetjeningsløsning til at søge om udvidet helbredstillæg.</p><ul><li>Du er folkepensionist eller førtidspensionist under reglerne fra før 2003</li><li>Du og din eventuelle ægtefælles/samlevers samlede formue overstiger ikke 108.000 kr. (år 2026).</li><li>Din personlige tillægsprocent er mere end 0. Udbetaling Danmark fastsætter din personlige tillægsprocent i forbindelse med pensionsberegningen og tallet fremgår af din pensionsmeddelelse.</li></ul><p><br><strong>Hvad kan jeg søge udvidet helbredstillæg til?</strong><br>Udvidet helbredstillæg gives til udgifter til tandproteser, briller og fodbehandling, hvis kommunen vurderer, at udgiften er nødvendig. Det er vigtigt, at du søger om udvidet helbredstillæg inden behandlingen påbegyndes.<br><br><strong>VIGTIGT!</strong><br><strong>Oplys din formue til Udbetaling Danmark</strong><br>Du skal oplyse din formue til Udbetaling Danmark, før din ansøgning om udvidet helbredstillæg er færdiggjort.<br>Oplysning om din formue skal ske via Udbetaling Danmark''s <a href=\"https://www.borger.dk/Handlingsside?selfserviceId=df161e6a-b52f-4dfd-b875-3fe42132f4cb\" target=\"_blank\">selvbetjeningsløsning </a>(åbner i nyt vindue)<br>Når du har gennemført denne selvbetjeningsløsning, vil ovenstående link til Udbetaling Danmark igen, fremkomme.</p><p><strong>Læs mere</strong><br>Du kan læse mere om lovgrundlag, klagevejledning og generel information om udvidet helbredstillæg under menupunktet <em>Helbredstillæg</em> på <a href=\"https://www.borger.dk/pension-og-efterloen/tillaeg-til-folke--og-foertidspension/Helbredstillaeg\" target=\"_blank\">borger.dk</a> (nyt vindue).</p><p>&nbsp;</p><h5>Bilag</h5><p>Så vidt muligt, skal du vedhæfte dokumentation i form af et overslag/tilbud på tandbehandling, fodbehandling eller briller som bilag.<br><br>Ved anvendelse af partsrepræsentant er det obligatorisk at vedhæfte en fuldmagt som bilag.<br><br>Bilag skal vedhæftes sidst i selvbetjeningsløsningen.</p><p>&nbsp;</p>'\n      markup_01:\n        '#type': webform_markup\n        '#markup': '<h3>Hvem udfylder ansøgningen</h3>'\n      helbredstillaeg_er_afhaengig_af_din_indkomst_og_din_formue:\n        '#type': details\n        '#title': 'Helbredstillæg er afhængig af din indkomst og din formue (Kan foldes ud)'\n        '#description': '<p>Din indkomst er opgjort af Udbetaling Danmark og er omregnet til din personlige tillægsprocent. Din personlige tillægsprocent skal være større end 0, for at du kan få helbredstillæg.<br>Din og din ægtefælles/samlevers likvide formue skal<br>være under 103.100 kr. (2025-sats), for at du kan få helbredstillæg. Likvid formue er værdien af forskellige værdipapirer (aktier og obligationer og tilsvarende), indestående i banken og dine kontanter.</p><p><br><strong>Ændringer i din økonomi</strong><br>Vær også opmærksom på, at du skal fortælle Udbetaling Danmark, hvis dine indtægter, formue og personlige forhold har ændret sig, siden du ansøgte om pension eller øvrige pensionsydelser eller siden sidste opgørelse fra Udbetaling Danmark ved årsskiftet. Du skal ændre den indkomst, som du betaler skat af, via forskudsregistrering på SKAT.dk. Øvrige ændringer meddeles digitalt til Udbetaling Danmark på Borger.dk. Hvis du ikke kan betjene dig selv digitalt, skal du henvende dig til din kommunes<br>borgerservice. Ændringer i indkomst, formue og personlige forhold kan medføre, at din folkepension og øvrige pensionsydelser skal ændres.</p><p><br><strong>Helbredstillæggets størrelse</strong><br>Udvidet helbredstillæg er 85% af din egen andel af den nødvendige udgift.<br>Kommunen kan indgå prisaftaler med leverandører af de nævnte ydelser. Hvis der er indgået prisaftale udgør helbredstillægget 85% af den aftalte pris.<br>Hvis du vælger en anden (dyrere) løsning, end den kommunen vurderer er nødvendig, eller vælger en anden (dyrere) leverandør, så skal du selv betale merudgiften. Hvis du vælger en billigere løsning udgør helbredstillægget 85% af den faktiske pris.<br>Har kommunen ikke indgået en prisaftale, beregnes helbredstillægget i forhold til den faktiske pris på den nødvendige udgift.</p><p><br><strong>Personligt tillæg</strong><br>Kommunen kan yde personligt tillæg til andre nødvendige og rimelige udgifter, som du ikke selv kan betale. Hvis du ikke selv kan betale din egen andel af de udgifter, der er omfattet af helbredstillægget, kan du også søge disse udgifter dækket.<br>For at få personligt tillæg, skal du være særligt vanskeligt stillet økonomisk.</p><p><br><strong>Yderligere information og vejledning</strong><br>Du kan få yderlige information og vejledning om udvidet helbredstillæg i din kommunes borgerservice. Optikeren, tandlægen og fodbehandleren ved ofte, om der overhovedet gives udvidet helbredstillæg til den behandling, som du har brug for.<br>Det er muligt at søge yderligere information om pension og øvrige pensionsydelser på www.borger.dk.<br>Hvis du har brug for personlig vejledning eller hjælp til digital selvbetjening skal du henvende dig til Udbetaling Danmark, hvis det drejer sig om folkepension, selve udbetalingen af din førtidspension, personlig tillægsprocent, formueopgørelse, varmetillæg og ældrecheck (se hvordan på Borger.dk).<br>Hvis du har brug for personlig hjælp og rådgivning eller yderligere vejledning til førtidspension, helbredstillæg og personligt tillæg, skal du henvende dig i kommunens borgerservice</p>'\n      du_skal_paa_denne_side_angive_om_du_er_ansoeger_eller_om_du_repr:\n        '#type': fieldset\n        '#title': 'Du skal på denne side, angive om du er ansøger eller om du repræsenterer en ansøger. Som partsrepræsentant er det et krav, at der vedhæftes en fuldmagt.'\n        '#title_display': invisible\n        '#attributes':\n          style: 'background: #EEFFE2; padding: 25px;'\n        markup_02:\n          '#type': webform_markup\n          '#markup': '<p>Du skal på denne side, angive om du er ansøger eller om du repræsenterer en ansøger. Som partsrepræsentant er det et krav, at der vedhæftes en fuldmagt.</p>'\n      jeg_udfylder_anmodningen_som:\n        '#type': radios\n        '#title': 'Jeg udfylder anmodningen som'\n        '#options':\n          'Ansøger, der ønsker at lave en anmodning om refusion i forbindelse med udgifter til behandling': 'Ansøger, der ønsker at lave en anmodning om refusion i forbindelse med udgifter til behandling'\n          'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger': 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n        '#required': true\n  fuldmagt_i_forbindelse_med_ansoegning_om_helbredstillaeg_og_per1:\n    '#type': webform_section\n    '#title': 'Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg'\n    '#title_display': invisible\n    '#states':\n      visible:\n        ':input[name=\"jeg_udfylder_anmodningen_som\"]':\n          value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    fuldmagt_i_forbindelse_med_ansoegning_om_helbredstillaeg_og_per2:\n      '#type': fieldset\n      '#title': 'Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_03:\n        '#type': webform_markup\n        '#markup': '<h3>Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg</h3>'\n      markup_12:\n        '#type': webform_markup\n        '#markup': '<h5>Undertegnede</h5>'\n      fuldmagt_for_og_mellemnavn_e1:\n        '#type': textfield\n        '#title': 'For- og mellemnavn(e)'\n        '#required': true\n      fuldmagt_efternavn:\n        '#type': textfield\n        '#title': Efternavn\n        '#required': true\n      fuldmagt_undertegnedepersonnummer:\n        '#type': textfield\n        '#title': Personnummer\n        '#required': true\n      vejnavn2:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n      husnummer2:\n        '#type': textfield\n        '#title': Husnummer\n        '#required': true\n      etage2:\n        '#type': textfield\n        '#title': Etage\n      side_doer2:\n        '#type': textfield\n        '#title': Side/Dør\n      postnummer2:\n        '#type': textfield\n        '#title': Postnummer\n        '#required'