          recipient_it_system_look_up: 1
          recipient_it_system: ''
          recipient_authority_override: 0
          recipient_authority: ''
        xml_template: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\r\n\r\n<Anmodning>\r\n  {# module://os2forms_fordelingskomponent/resources/SP/SF2900_XSD/Anmodning.xsd #}\r\n\r\n  {% macro cvr(value) -%}\r\n    {{ 'urn:oio:cvr-nr:%08d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro personnummer(value) -%}\r\n    {{ 'urn:oio:cpr:%010d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro telefonnummer(value) -%}\r\n    {{ '%08d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro date(value) -%}\r\n    {{ value|date('Y-m-d') }}\r\n  {%- endmacro %}\r\n\r\n  {% macro max_laengde_strings_200(value) -%}\r\n    {{ value|trim|slice(0, 200) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro normalString(value) -%}\r\n    {{ value|trim|slice(0, 200) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro longString(value) -%}\r\n    {{ value|trim|slice(0, 500) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro positive_integer(value) -%}\r\n    {%- set value = max(1, value|number_format(0, '', '')) -%}\r\n    {{ '%d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro positive_integer_type_or_empty(value) -%}\r\n    {%- if value is not empty -%}\r\n      {%- set value = max(1, value|number_format(0, '', '')) -%}\r\n      {{ '%d'|format(value) }}\r\n    {%- endif -%}\r\n  {%- endmacro %}\r\n\r\n  {# number_format (https://twig.symfony.com/doc/3.x/filters/number_format.html) will cast anything (that can be casted to a float) to a float before formatting\r\n    (cf. https://github.com/twigphp/Twig/blob/99d95dd6b8b0cc3c2397d15d45a4bb87eff89ddc/src/Extension/CoreExtension.php#L698) #}\r\n\r\n  {# Strip thousand and decimal separators (from Danish floats); compute with 4 decimals #}\r\n  {% macro decimal_value(value) -%}\r\n    {%- set value = value|replace({'.': ''})|replace({',': '.'})|number_format(4, '.', '') -%}\r\n    {{ value }}\r\n  {%- endmacro %}\r\n\r\n  {% macro positiv_decimal_type(value) -%}\r\n    {%- set value = max(0.01, value|replace({'.': ''})|replace({',': '.'})|number_format(4, '.', '')) -%}\r\n    {{ value|number_format(2, '.', '') }}\r\n  {%- endmacro %}\r\n\r\n  {% macro decimal_type(value) -%}\r\n    {%- set value = value|replace({'.': ''})|replace({',': '.'})|number_format(4, '.', '') -%}\r\n    {{ value|number_format(2, '.', '') }}\r\n  {%- endmacro %}\r\n\r\n  {% macro beloeb(value) -%}\r\n    {{ value|replace({'.': ''})|replace({',': '.'})|number_format(2, '.', '') }}\r\n  {%- endmacro %}\r\n\r\n  <Header>\r\n    <Myndighed>urn:oio:cvr-nr:{{ handler.settings.sender.sender_id }}</Myndighed>\r\n    <ModtagetDato>{{ _self.date(submission.completed) }}</ModtagetDato>\r\n    <KLE>{{ handler.settings.distribution_context.kle_emne }}</KLE>\r\n\r\n    {% set grouped_files = {\r\n      Bilag: []|merge(\r\n        files.tilfoej_bilag,\r\n      ),\r\n      Faktura: []|merge(\r\n      ),\r\n      Overslag: []|merge(\r\n      ),\r\n    } %}\r\n    {% for type, files in grouped_files %}\r\n      {% for file in files %}\r\n        <Dokumenter>\r\n          <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n          <Dokumenttype>{{ type }}</Dokumenttype>\r\n        </Dokumenter>\r\n      {% endfor %}\r\n    {% endfor %}\r\n  </Header>\r\n\r\n  <AnsoegerOplysninger>\r\n    <Ansoeger>\r\n      <Fornavn>{{ submission.data.ansoegeroplysninger_ansoeger_fornavn|trim }}</Fornavn>\r\n      {% if submission.data.ansoegeroplysninger_ansoeger_mellemnavn|default(false) %}\r\n      <Mellemnavn>{{ submission.data.ansoegeroplysninger_ansoeger_mellemnavn|trim }}</Mellemnavn>\r\n      {% endif %}\r\n      <Efternavn>{{ submission.data.ansoegeroplysninger_ansoeger_efternavn|trim }}</Efternavn>\r\n      <Personnummer>{{ _self.personnummer(submission.data.ansoegeroplysninger_ansoeger_personnummer_cpr_) }}</Personnummer>\r\n      {% if submission.data.ansoegeroplysninger_ansoeger_telefonnummer|default(false) %}\r\n      <Telefonnummer>{{ _self.telefonnummer(submission.data.ansoegeroplysninger_ansoeger_telefonnummer) }}</Telefonnummer>\r\n      {% endif %}\r\n    </Ansoeger>\r\n  </AnsoegerOplysninger>\r\n\r\n  <Sagstype>\r\n    {% if submission.data.sagstype == 'Helbredstillæg' %}\r\n    <AlmindeligtHelbredstillaeg>{{ submission.data.sagstype_almindeligthelbredstillaeg|trim }}</AlmindeligtHelbredstillaeg>\r\n    {% else %}\r\n    <UdvidetHelbredstillaeg>{{ submission.data.sagstype_udvidethelbredstillaeg|trim }}</UdvidetHelbredstillaeg>\r\n    {% endif %}\r\n  </Sagstype>\r\n\r\n  <Underskriftsoplysninger>\r\n    <Underskrift>{{ submission.data.ansoegeroplysninger_ansoeger_fornavn }}{% if submission.data.ansoegeroplysninger_ansoeger_mellemnavn|default(false) %} {{ submission.data.ansoegeroplysninger_ansoeger_mellemnavn }}{% endif %} {{ submission.data.ansoegeroplysninger_ansoeger_efternavn }}</Underskrift>\r\n    <Underskriftsdato>{{ _self.date(submission.data.underskriftsoplysninger_underskriftsdato) }}</Underskriftsdato>\r\n  </Underskriftsoplysninger>\r\n\r\n  <!-- @todo\r\n  <Bemaerkning>{{ _self.max_laengde_strings_200('') }}</Bemaerkning>\r\n  -->\r\n\r\n  {% if submission.data.giver_med_min_underskrift_begraenset_fuldmagt_til is not empty %}\r\n  <Fuldmagt>\r\n    <FuldmagtDokumentnavn>{{ submission.data.for_og_mellemnavn_e1|trim }} {{ submission.data.efternavn1|trim }}</FuldmagtDokumentnavn>\r\n    <FuldmagthaversPersonnummer>{{ _self.personnummer(submission.data.personnummer1) }}</FuldmagthaversPersonnummer>\r\n  </Fuldmagt>\r\n  {% endif %}\r\n\r\n</Anmodning>\r\n"
        xsd_url: 'module://os2forms_fordelingskomponent/resources/SP/SF2900_XSD/Anmodning.xsd'
