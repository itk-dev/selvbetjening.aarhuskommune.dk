und: #E5F5E0; padding: 25px;  '\n    bilag2:\n      '#type': fieldset\n      '#title': Bilag\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_20:\n        '#type': webform_markup\n        '#markup': \"<h3><strong>Bilag</strong></h3><p>På denne side medsender du bilag. Hvis du vil medsende yderligere bilag, kan du navngive det som 'Yderligere bilag'.</p><p><strong>Følgende bilag skal tilføjes:</strong><br>- Dokumentation for udgiften</p>\"\n      tilfoej_bilag:\n        '#type': managed_file\n        '#title': 'Tilføj bilag'\n        '#required': true\n        '#format': name\n        '#max_filesize': '45'\n        '#file_extensions': 'jpg jpeg png pict txt pdf doc docx'\n      jeg_bekraefter_hermed_at_jeg_har_vedhaeftet_alle_obligatoriske_b:\n        '#type': checkbox\n        '#title': 'Jeg bekræfter hermed at jeg har vedhæftet alle obligatoriske bilag.'\n        '#required': true\nunderskrift2:\n  '#type': webform_wizard_page\n  '#title': Underskrift\n  underskriftsoplysninger:\n    '#type': webform_section\n    '#title': Underskrift\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    underskrift4:\n      '#type': fieldset\n      '#title': Underskrift\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      underskriftsoplysninger_underskrift:\n        '#type': webform_signature\n        '#title': Underskrift\n        '#description': '<p>Sign above</p>'\n        '#required': true\n    underskriftsoplysninger_underskriftsdato:\n      '#type': date\n      '#title': Underskriftsdato\n      '#disabled': true\n      '#default_value': today\n      '#date_date_format': d-m-Y\nkvittering:\n  '#type': os2forms_attachment\n  '#title': Kvittering\n  '#filename': Kvittering.pdf\n  '#export_type': pdf\n  '#digital_signature': 0\n  '#excluded_elements': {  }\n  '#exclude_empty': 0\n  '#exclude_empty_checkbox': 0\nactions:\n  '#type': webform_actions\n  '#title': 'Send knap(per)'\n  '#states':\n    invisible:\n      ':input[name=\"ansoegeroplysninger_ansoeger_adresse\"]':\n        empty: true"
