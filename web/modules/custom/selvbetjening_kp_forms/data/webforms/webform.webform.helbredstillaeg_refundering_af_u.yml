id: helbredstillaeg_refundering_af_u
title: 'Helbredstillæg - Refundering af udlæg - SP941_000 (ANMODNING)'
description: '<p><strong>Beskrivelse:</strong>&nbsp;Hvis du har fået bevilget helbredstillæg, og du har betalt for behandlinger/ydelser, uden at dit tilskud er blevet fratrukket på din regning, kan du anmode kommunen om at få refunderet dit udlæg.<br>&nbsp;<br><strong>Ejer:</strong>&nbsp;&nbsp;</p><p><br><strong>Afdeling:</strong>&nbsp;Pension<br><br><strong>Postkasse:&nbsp;pension@msb.aarhus.dk</strong></p><p><br><strong>Direkte link:</strong>&nbsp;<br>&nbsp;<br><strong>Shortlink:</strong>&nbsp;<br>&nbsp;<br><strong>Henvisninger:&nbsp; SP941_000 </strong>Også kaldt "ANMODNING"<br><br><strong>Sprog:</strong> Dansk</p>'
categories:
  - Ekstern
  - KP
  - Test
elements: "oplysninger1:\n  '#type': webform_wizard_page\n  '#title': Oplysninger\n  ansoegeroplysninger:\n    '#type': webform_section\n    '#title': 'Dine oplysninger '\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #F5F5F5; padding: 25px; border-radius: 8px;'\n    markup_01:\n      '#type': webform_markup\n      '#markup': '<h3>Hvem udfylder anmodningen</h3>'\n    ansoegeroplysninger_ansoeger_fornavn:\n      '#type': os2forms_nemid_first_name\n      '#title': Fornavn\n      '#multiple': false\n      '#readonly': true\n      '#required': true\n    ansoegeroplysninger_ansoeger_mellemnavn:\n      '#type': os2forms_nemid_middle_name\n      '#title': Mellemnavn\n      '#multiple': false\n      '#readonly': true\n    ansoegeroplysninger_ansoeger_efternavn:\n      '#type': os2forms_nemid_last_name\n      '#title': Efternavn\n      '#multiple': false\n      '#readonly': true\n      '#required': true\n    ansoegeroplysninger_ansoeger_personnummer_cpr_:\n      '#type': os2forms_nemid_cpr\n      '#title': 'CPR nummer'\n      '#multiple': false\n      '#readonly': true\n      '#required': true\n    ansoegeroplysninger_ansoeger_telefon:\n      '#type': tel\n      '#title': Telefon\n    ansoegeroplysninger_ansoeger_adresse:\n      '#type': os2forms_nemid_address\n      '#title': Adresse\n      '#multiple': false\n      '#readonly': true\n    markup_02:\n      '#type': webform_markup\n      '#states':\n        invisible:\n          ':input[name=\"ansoegeroplysninger_ansoeger_adresse\"]':\n            empty: true\n      '#wrapper_attributes':\n        style: 'background-color: #E2F2FB; padding:1em; max-width: 50%; border-radius: 8px; border-left: 5px #1B86C3 solid;'\n      '#markup': '<h6>Du skal herunder, angive om du er ansøger eller om du repræsenterer en ansøger. Som partsrepræsentant er det et krav, at der vedhæftes en fuldmagt.</h6>'\n    jeg_udfylder_anmodningen_som:\n      '#type': radios\n      '#title': 'Jeg udfylder anmodningen som'\n      '#options':\n        'Ansøger, der ønsker at lave en anmodning om refusion i forbindelse med udgifter til behandling': 'Ansøger, der ønsker at lave en anmodning om refusion i forbindelse med udgifter til behandling'\n        'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger': 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n      '#required': true\n      '#states':\n        invisible:\n          ':input[name=\"ansoegeroplysninger_ansoeger_adresse\"]':\n            empty: true\n  markup_04:\n    '#type': webform_markup\n    '#states':\n      visible:\n        ':input[name=\"ansoegeroplysninger_ansoeger_adresse\"]':\n          empty: true\n    '#wrapper_attributes':\n      style: 'background-color: #FFEECC; padding:1em; max-width: 50%;border-radius: 8px; border-left: 5px #FEBB30 solid;'\n    '#markup': '<p>Du er registreret med en udenlandsk adresse, og du skal derfor benytte Anmodning om refusion i forbindelse med udgifter til behandling via Udbetaling Danmark. Du finder Udbetaling Danmark og yderligere vejledning på <a href=\"http://www.borger.dk/\" target=\"_blank\">borger.dk</a> (nyt vindue). Er du imidlertid flyttet til en dansk kommune, skal du rette dine adresseoplysninger og påbegynde denne ansøgning på ny, når det er slået igennem.</p>'\n  fuldmagt_i_forbindelse_med_ansoegning_om_helbredstillaeg_og_per1:\n    '#type': webform_section\n    '#title': 'Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg'\n    '#title_display': invisible\n    '#states':\n      visible:\n        ':input[name=\"jeg_udfylder_anmodningen_som\"]':\n          value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    fuldmagt_i_forbindelse_med_ansoegning_om_helbredstillaeg_og_per2:\n      '#type': fieldset\n      '#title': 'Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_03:\n        '#type': webform_markup\n        '#markup': '<h3>Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg</h3>'\n      markup_12:\n        '#type': webform_markup\n        '#markup': '<h5>Undertegnede</h5>'\n      for_og_mellemnavn_e1:\n        '#type': textfield\n        '#title': 'For- og mellemnavn(e)'\n        '#required': true\n      efternavn1:\n        '#type': textfield\n        '#title': Efternavn\n        '#required': true\n      personnummer1:\n        '#type': textfield\n        '#title': Personnummer\n        '#required': true\n      vejnavn2:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n      husnummer2:\n        '#type': textfield\n        '#title': Husnummer\n        '#required': true\n      etage2:\n        '#type': textfield\n        '#title': Etage\n      side_doer2:\n        '#type': textfield\n        '#title': Side/Dør\n      postnummer2:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n      by2:\n        '#type': textfield\n        '#title': By\n        '#required': true\n      giver_med_min_underskrift_begraenset_fuldmagt_til:\n        '#type': checkboxes\n        '#title': 'Giver med min underskrift begrænset fuldmagt til'\n        '#options':\n          Person: Person\n          Virksomhed: Virksomhed\n        '#required': true\n      markup_13:\n        '#type': webform_markup\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n        '#markup': '<h3>Til person</h3>'\n      for_og_mellemnavn_e2:\n        '#type': textfield\n        '#title': 'For- og mellemnavn(e)'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt