ible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Virksomhed]\"]':\n              checked: true\n      postnummer4:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Virksomhed]\"]':\n              checked: true\n      by4:\n        '#type': textfield\n        '#title': By\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Virksomhed]\"]':\n              checked: true\n      markup_17:\n        '#type': webform_markup\n        '#markup': '<p><strong>Erklæring</strong></p>'\n      som_partsrepraesentant_erklaerer_jeg_at_der_foreligger_en_unders:\n        '#type': checkbox\n        '#title': 'Som partsrepræsentant erklærer jeg, at der foreligger en underskrevet fuldmagt, der vil blive vedhæftet som bilag'\n        '#states':\n          visible:\n            ':input[name=\"jeg_udfylder_anmodningen_som\"]':\n              value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n      markup_15:\n        '#type': webform_markup\n        '#markup': '<h3>Fuldmagtens omfang</h3><p>Fuldmagten giver tilladelse til, at partsrepræsentanten må hjælpe mig med at få udfyldt, signeret (med partsrepræsentants NemID) og indsendt:</p>'\n      ansoegning_om:\n        '#type': radios\n        '#title': 'Ansøgning om'\n        '#title_display': invisible\n        '#options':\n          'Ansøgning om Helbredstillæg': 'Ansøgning om Helbredstillæg'\n          'Ansøgning om Udvidet Helbredstillæg': 'Ansøgning om Udvidet Helbredstillæg'\n          'Ansøgning om Personligt tillæg': 'Ansøgning om Personligt tillæg'\n          'Anmodning om refusion i forbindelse med udgifter til behandling': 'Anmodning om refusion i forbindelse med udgifter til behandling'\n        '#required': true\n      markup_16:\n        '#type': webform_markup\n        '#markup': '<p>Denne fuldmagt er begrænset og er ikke en tilladelse til at handle på mine vegne i den efterfølgende sagsbehandling og dialog med kommunen.&nbsp;</p><h3>Ikrafttrædelse og tilbagekaldelse</h3><p>Fuldmagten gælder fra den dato, jeg har underskrevet, og dækker alene den konkrete tilhørende ansøgning/anmodning.</p>'\n      dato:\n        '#type': date\n        '#title': Dato\n        '#required': true\n      underskrift:\n        '#type': webform_signature\n        '#title': Underskrift\n        '#description': '<p>Sign above</p>'\n        '#required': true\noplysninger_om_behandling:\n  '#type': webform_wizard_page\n  '#title': 'Oplysninger om behandling'\n  oplysninger_om_behandling1:\n    '#type': webform_section\n    '#title': 'Oplysninger om behandling'\n    '#title_tag': h4\n    '#attributes':\n      style: 'background: #F5F5F5; padding: 25px; border-radius: 8px;'\n    markup_09:\n      '#type': webform_markup\n      '#markup': '<h3>Oplysninger om behandling</h3>'\n    markup_05:\n      '#type': webform_markup\n      '#wrapper_attributes':\n        style: 'background-color: #E2F2FB; padding:1em; max-width: 50%; border-radius: 8px; border-left: 5px #1B86C3 solid;'\n      '#markup': '<h6>På denne side skal du oplyse om den type af behandling og tillæg som din udgift relaterer sig til.</h6>'\n    sagstype:\n      '#type': radios\n      '#title': 'Udgiften vedrører'\n      '#options':\n        Helbredstillæg: Helbredstillæg\n        'Udvidet helbredstillæg': 'Udvidet helbredstillæg'\n      '#required': true\n    markup_06:\n      '#type': webform_markup\n      '#states':\n        visible:\n          ':input[name=\"sagstype\"]':\n            value: Helbredstillæg\n      '#wrapper_attributes':\n        style: 'background-color: #E2F2FB; padding:1em; max-width: 50%; border-radius: 8px; border-left: 5px #1B86C3 solid;'\n      '#markup': '<p>Kommunen bevilger helbredstillæg til helbredsbetingede udgifter, når du også får tilskud efter sundhedsloven (visse typer lægemidler og visse behandlinger og udgifter til tandlæge, fodterapeut, fysioterapeut, kiropraktor og psykolog).</p><p>En bevilling af helbredstillæg gælder et kalenderår ad gangen.<br>Hvis du ikke allerede har ansøgt om helbredstillæg, kan du finde selvbetjeningsløsningen på borger.dk (nyt vindue) eller på kommunens hjemmeside.</p>'\n    markup_08:\n      '#type': webform_markup\n      '#states':\n        visible:\n          ':input[name=\"sagstype\"]':\n            value: 'Udvidet helbredstillæg'\n      '#wrapper_attributes':\n        style: 'background-color: #E2F2FB; padding:1em; max-width: 50%; border-radius: 8px; border-left: 5px #1B86C3 solid;'\n      '#markup': '<p>Det er påkrævet at ansøge om udvidet helbredstillæg før en behandling udføres.<br>Hvis du ikke allerede har ansøgt om udvidet helbredstillæg, kan du finde selvbetjeningsløsningen på <a href=\"https://www.borger.dk/pension-og-efterloen/tillaeg-til-folke--og-foertidspension/Helbredstillaeg/\">borger.dk</a> (nyt vindue) eller på kommunens hjemmeside.<br><br>Denne selvbetjeningsløsning omhandler kun refusion af dine udgifter.<br>Hvis du er blevet godkendt, og behandlingen er udført, kan du fortsætte med denne selvbetjeningsløsning.</p>'\n    kommunen_bevilger_helbredstillaeg_til_helbredsbetingede_udgifter:\n      '#type': webform_section\n      '#title': Helbredstillæg\n      '#title_display': invisible\n      '#title_tag': h4\n      '#states':\n        visible:\n          ':input[name=\"sagstype\"]':\n            value: Helbredstillæg\n      '#attributes':\n        style: 'background: #F5F5F5; padding: 25px; border-radius: 8px;'\n      sagstype_almindeligthelbredstillaeg:\n        '#type': radios\n        '#title': 'Angiv type af behandling, hvortil der ydes helbredstillæg'\n        '#options':\n          Medicin: Medicin\n          Tandbehandling: Tandbehandling\n          Fodbehandling: 'Fodbehandling --  (v. sukkersyge, nedgroede tånegle, arvæv efter strålebehandling og svær leddegigt) Kræver lægehenvisning'\n          Fysioterapi: Fysioterapi\n          Kiropraktik: Kiropraktik\n          Psykologhjaelp: Psykologhjælp\n          Hoereappartbehandling: 'Høreapparatbehandling  -- (v. privat leverandør)'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"sagstype\"]':\n              value: Helbredstillæg\n    det_er_paakraevet_at_ansoege_om_udvidet_helbredstillaeg_foer_en:\n      '#type': webform_section\n      '#title': 'Udvidet helbredstillæg'\n      '#title_display': invisible\n      '#title_tag': h4\n      '#states':\n        visible:\n          ':input[name=\"sagstype\"]':\n            value: 'Udvidet helbredstillæg'\n      '#attributes':\n        style: 'background: #F5F5F5; padding: 25px; border-radius: 8px;'\n      sagstype_udvidethelbredstillaeg:\n        '#type': radios\n        '#title': 'Angiv type af behandling, hvortil der ydes udvidet helbredstillæg'\n        '#options':\n          Tandprotese: Tandprotese\n          Fodbehandling: Fodbehandling\n          Briller: Briller\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"sagstype\"]':\n              value: 'Udvidet helbredstillæg'\noplysninger_om_behandleren:\n  '#type': webform_wizard_page\n  '#title': 'Oplysninger om behandleren'\n  oplysninger_om_behandleren1:\n    '#type': webform_section\n    '#title': 'Oplysninger om behandleren'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    oplysninger_om_behandleren2:\n      '#type': fieldset\n      '#title': 'Oplysninger om behandleren'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_11:\n        '#type': webform_markup\n        '#markup': '<h3>Oplysninger om behandleren</h3>'\n      paa_denne_side_skal_du_oplyse_om_den_behandler_der_har_leveret_d:\n        '#type': fieldset\n        '#title': 'På denne side skal du oplyse om den behandler, der har leveret den behandling, som din udgift relaterer sig til. En behandler kan fx. være en fysioterapeut, kiropraktor eller psykolog.'\n        '#title_display': invisible\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;max-width: 500px;'\n        markup_10:\n          '#type': webform_markup\n          '#markup': '<p>På denne side skal du oplyse om den behandler, der har leveret den behandling, som din udgift relaterer sig til. En behandler kan fx. være en fysioterapeut, kiropraktor eller psykolog.</p>'\n      cvr_nummer:\n        '#type': textfield\n        '#title': 'CVR-nummer '\n        '#help_title': CVR-nummeret\n        '#help': '<p>Kender du ikke CVR-nummeret på din leverandør/behandler, fremgår det ofte på fakturaen/kvitteringen. Du kan også finde det via denne hjemmeside: <a href=\"http://cvr.dk/\" target=\"_blank\">http:/cvr.dk/</a> (nyt vindue). Her kan du fremfinde det korrekte CVR-nummer ved f.eks. at søge på navn eller adresse. Anførsel af CVR i denne guide medfører at de resterende oplysninger om leverandør/behandler udfyldes.</p>'\n        '#required': true\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      evt_p_nummer:\n        '#type': textfield\n        '#title': 'Evt. P-nummer'\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      navn:\n        '#type': textfield\n        '#title': Navn\n        '#required': true\n      behandleren_har_ikke_dansk_adresse:\n        '#type': checkbox\n        '#title': 'Behandleren har ikke dansk adresse'\n      vejnavn1:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      husnummer1:\n        '#type': textfield\n        '#title': Husnummer\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n        '#required': true\n      etage1:\n        '#type': textfield\n        '#title': Etage\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      side_doer1:\n        '#type': textfield\n        '#title': Side/Dør\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      postnummer1:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      by1:\n        '#type': textfield\n        '#title': By\n        '#states':\n          invisible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      adresselinje_11:\n        '#type': textfield\n        '#title': 'Adresselinje 1'\n        '#states':\n          visible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      adresselinje_22:\n        '#type': textfield\n        '#title': 'Adresselinje 2'\n        '#states':\n          visible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      adresselinje_33:\n        '#type': textfield\n        '#title': 'Adresselinje 3'\n        '#states':\n          visible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n              checked: true\n      adresselinje_44:\n        '#type': textfield\n        '#title': 'Adresselinje 4'\n        '#states':\n          visible:\n            ':input[name=\"behandleren_har_ikke_dansk_adresse\"]':\n  