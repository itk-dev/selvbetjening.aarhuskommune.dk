  fordelingskomponent_sf2900:
    id: os2forms_fordelingskomponent_sf2900
    handler_id: fordelingskomponent_sf2900
    label: 'Fordelingskomponent (sf2900)'
    notes: ''
    status: true
    conditions: {  }
    weight: 0
    settings:
      distribution_context:
        routing_modtager_aktoer: ''
        kle_emne: 32.03.12
        handling_facet: G01
        titel: 'Specificeret overslag fra optiker/øjenlæge (SP246)'
        beskrivelse: 'Se https://rimi-itk.github.io/digitaliseringskataloget.dk/digitaliseringskataloget.dk/sf1415/0.6/Integrationsbeskrivelse_SF1415.pdf#page=14 for at finde formulartype mm.'
      distribution_object:
        distribution_type: FORMULAR
        journalpost_message: ''
        attachment_element: kvittering
        formular_type: ØjenspecialistOverslagFormular_1
        brugervendt_noegle: ''
        files:
          filspecifikation: ØjenspecialistOverslagBilag_1
          recipient_it_system_look_up: 1
          recipient_it_system: ''
          recipient_authority_override: 0
          recipient_authority: ''
        xml_template: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\r\n\r\n<SP246>\r\n  {# module://os2forms_fordelingskomponent/resources/SP/SF2900_XSD/SP246.xsd #}\r\n\r\n  {% macro personnummer(value) -%}\r\n  {{ 'urn:oio:cpr:%010d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro telefonnummer(value) -%}\r\n    {{ '%08d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro date(value) -%}\r\n  {{ value|date('Y-m-d') }}\r\n  {%- endmacro %}\r\n\r\n  {% macro max_laengde_strings_200(value) -%}\r\n  {{ value|trim|slice(0, 200) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro positive_integer(value) -%}\r\n  {%- set value = max(1, value|number_format(0, '', '')) -%}\r\n  {{ '%d'|format(value) }}\r\n  {%- endmacro %}\r\n\r\n  {% macro positive_integer_type_or_empty(value) -%}\r\n  {%- if value is not empty -%}\r\n  {%- set value = max(1, value|number_format(0, '', '')) -%}\r\n  {{ '%d'|format(value) }}\r\n  {%- endif -%}\r\n  {%- endmacro %}\r\n\r\n  {# number_format (https://twig.symfony.com/doc/3.x/filters/number_format.html) will cast anything (that can be casted to a float) to a float before formatting\r\n  (cf. https://github.com/twigphp/Twig/blob/99d95dd6b8b0cc3c2397d15d45a4bb87eff89ddc/src/Extension/CoreExtension.php#L698) #}\r\n\r\n  {# Strip thousand and decimal separators (from Danish floats); compute with 4 decimals #}\r\n  {% macro decimal_value(value) -%}\r\n  {%- set value = value|replace({'.': ''})|replace({',': '.'})|number_format(4, '', '') -%}\r\n  {{ value }}\r\n  {%- endmacro %}\r\n\r\n  {% macro positiv_decimal_type(value) -%}\r\n  {%- set value = max(0.01, value|replace({'.': ''})|replace({',': '.'})|number_format(4, '', '')) -%}\r\n  {{ value|number_format(2, '.', '') }}\r\n  {%- endmacro %}\r\n\r\n  {% macro decimal_type(value) -%}\r\n  {%- set value = value|replace({'.': ''})|replace({',': '.'})|number_format(4, '', '') -%}\r\n  {{ value|number_format(2, '.', '') }}\r\n  {%- endmacro %}\r\n\r\n  <Header>\r\n    <Myndighed>urn:oio:cvr-nr:{{ handler.settings.sender.sender_id }}</Myndighed>\r\n    <ModtagetDato>{{ _self.date(submission.completed) }}</ModtagetDato>\r\n    <KLE>{{ handler.settings.distribution_context.kle_emne }}</KLE>\r\n    {% for file in files.dokumenter_overslag|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Overslag</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n    {% for file in files.dokumenter_faktura|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Faktura</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n    {% for file in files.dokumenter_bilag|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Bilag</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n  </Header>\r\n\r\n  <Aarsag>\r\n    {% if submission.data.aarsag_begrundelse == 'HarBriller' %}\r\n    <HarBriller>\r\n      <Alder>{{ _self.positive_integer(submission.data.aarsag_harbriller_alder) }}</Alder>\r\n    </HarBriller>\r\n    {% endif %}\r\n\r\n    {% if submission.data.aarsag_begrundelse == 'Synsændring' %}\r\n    <AndenBegrundelse>\r\n    </AndenBegrundelse>\r\n    {% endif %}\r\n\r\n    {% if submission.data.er_der_specielle_forhold_fx_allergi_der_goer_sig_gaeldende_for_v == 'Ja' %}\r\n    <SpecielleForhold>{{ _self.max_laengde_strings_200(submission.data.aarsag_specielleforhold) }}</SpecielleForhold>\r\n    {% endif %}\r\n  </Aarsag>\r\n\r\n  <Overslag>\r\n    {# @todo #}\r\n    {% set values = [] %}\r\n\r\n    <Brilleglas>\r\n      <Venstre>\r\n          <Styrke>{{ _self.decimal_type('@todo') }}</Styrke>\r\n          <Cylinder>{{ _self.decimal_type('@todo') }}</Cylinder>\r\n          <Addition>{{ _self.decimal_type('@todo') }}</Addition>\r\n          <Akse>{{ _self.positive_integer_type_or_empty('@todo') }}</Akse>\r\n      </Venstre>\r\n      <Hoejre>\r\n          <Styrke>{{ _self.decimal_type('@todo') }}</Styrke>\r\n          <Cylinder>{{ _self.decimal_type('@todo') }}</Cylinder>\r\n          <Addition>{{ _self.decimal_type('@todo') }}</Addition>\r\n          <Akse>{{ _self.positive_integer_type_or_empty('@todo') }}</Akse>\r\n      </Hoejre>\r\n      <Pris>{{ _self.positiv_decimal_type('@todo') }}</Pris>\r\n    </Brilleglas>\r\n\r\n    <Brillestel>\r\n      <Navn>{{ _self.max_laengde_strings_200('@todo') }}</Navn>\r\n      <Pris>{{ _self.positiv_decimal_type('@todo') }}</Pris>\r\n    </Brillestel>\r\n\r\n    <Andet>\r\n      <Brilleglas>\r\n        <Venstre>\r\n          <Styrke>{{ _self.decimal_type('@todo') }}</Styrke>\r\n          <Cylinder>{{ _self.decimal_type('@todo') }}</Cylinder>\r\n          <Addition>{{ _self.decimal_type('@todo') }}</Addition>\r\n          <Akse>{{ _self.positive_integer_type_or_empty('@todo') }}</Akse>\r\n        </Venstre>\r\n        <Hoejre>\r\n          <Styrke>{{ _self.decimal_type('@todo') }}</Styrke>\r\n          <Cylinder>{{ _self.decimal_type('@todo') }}</Cylinder>\r\n          <Addition>{{ _self.decimal_type('@todo') }}</Addition>\r\n          <Akse>{{ _self.positive_integer_type_or_empty('@todo') }}</Akse>\r\n        </Hoejre>\r\n        <Pris>{{ _self.positiv_decimal_type('@todo') }}</Pris>\r\n      </Brilleglas>\r\n\r\n      <Brillestel>\r\n        <Navn>{{ _self.max_laengde_strings_200('@todo') }}</Navn>\r\n        <Pris>{{ _self.positiv_decimal_type('@todo') }}</Pris>\r\n      </Brillestel>\r\n\r\n    </Andet>\r\n\r\n    {% set sum = values|reduce((carry, value) => carry + value) %}\r\n    <Pris>{{ _self.positiv_decimal_type(sum) }}</Pris>\r\n  </Overslag>\r\n\r\n  <Erklaering>\r\n    <NavnAnsoeger>{{ submission.data.navnansoeger|trim }}</NavnAnsoeger>\r\n    <CPRAnsoeger>{{ _self.personnummer(submission.data.cpransoeger) }}</CPRAnsoeger>\r\n    <UnderskriftsoplysningerAnsoeger>\r\n      <UnderskriftAnsoeger>{{ submission.data.erklaering_navnansoeger }}</UnderskriftAnsoeger>\r\n      <UnderskriftsdatoAnsoeger>{{ _self.date(submission.data.erklaering_underskriftsoplysningeransoeger_underskriftsdatoansoeger) }}</UnderskriftsdatoAnsoeger>\r\n    </UnderskriftsoplysningerAnsoeger>\r\n  </Erklaering>\r\n\r\n  <Behandler>\r\n    <UnderskriftsoplysningerBehandler>\r\n      <UnderskriftBehandler>@todo</UnderskriftBehandler>\r\n      <UnderskriftsdatoBehandler>{{ _self.date(submission.data.behandler_underskriftsoplysningerbehandler_underskriftsdatobehandler) }}</UnderskriftsdatoBehandler>\r\n    </UnderskriftsoplysningerBehandler>\r\n    <TelefonnummerBehandler>{{ _self.telefonnummer(submission.data.behandler_telefonnummerbehandler) }}</TelefonnummerBehandler>\r\n    <EMailBehandler>{{ submission.data.behandler_emailbehandler }}</EMailBehandler>\r\n  </Behandler>\r\n\r\n</SP246>\r\n"
        xsd_url: 'module://os2forms_fordelingskomponent/resources/SP/SF2900_XSD/SP246.xsd'
variants: {  }

