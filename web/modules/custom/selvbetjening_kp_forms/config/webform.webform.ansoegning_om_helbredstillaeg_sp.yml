          recipient_authority: '55133018'
        xml_template: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\r\n\r\n<SP241>\r\n  {# module://os2forms_fordelingskomponent/resources/SP/SF2900_XSD/SP241.xsd #}\r\n\r\n{% macro cvr(value) -%}\r\n  {{ 'urn:oio:cvr-nr:%08d'|format(value) }}\r\n{%- endmacro %}\r\n\r\n{% macro personnummer(value) -%}\r\n  {{ 'urn:oio:cpr:%010d'|format(value) }}\r\n{%- endmacro %}\r\n\r\n{% macro telefonnummer(value) -%}\r\n  {{ '%08d'|format(value) }}\r\n{%- endmacro %}\r\n\r\n{% macro date(value) -%}\r\n  {{ value|date('Y-m-d') }}\r\n{%- endmacro %}\r\n\r\n{% macro max_laengde_strings_200(value) -%}\r\n  {{ value|trim|slice(0, 200) }}\r\n{%- endmacro %}\r\n\r\n{% macro positive_integer(value) -%}\r\n  {%- set value = max(1, value|number_format(0, '', '')) -%}\r\n  {{ '%d'|format(value) }}\r\n{%- endmacro %}\r\n\r\n{% macro positive_integer_type_or_empty(value) -%}\r\n  {%- if value is not empty -%}\r\n    {%- set value = max(1, value|number_format(0, '', '')) -%}\r\n    {{ '%d'|format(value) }}\r\n  {%- endif -%}\r\n{%- endmacro %}\r\n\r\n{# number_format (https://twig.symfony.com/doc/3.x/filters/number_format.html) will cast anything (that can be casted to a float) to a float before formatting\r\n  (cf. https://github.com/twigphp/Twig/blob/99d95dd6b8b0cc3c2397d15d45a4bb87eff89ddc/src/Extension/CoreExtension.php#L698) #}\r\n\r\n{# Strip thousand and decimal separators (from Danish floats); compute with 4 decimals #}\r\n{% macro decimal_value(value) -%}\r\n  {%- set value = value|replace({'.': ''})|replace({',': '.'})|number_format(4, '', '') -%}\r\n  {{ value }}\r\n{%- endmacro %}\r\n\r\n{% macro positiv_decimal_type(value) -%}\r\n  {%- set value = max(0.01, value|replace({'.': ''})|replace({',': '.'})|number_format(4, '', '')) -%}\r\n  {{ value|number_format(2, '.', '') }}\r\n{%- endmacro %}\r\n\r\n{% macro decimal_type(value) -%}\r\n  {%- set value = value|replace({'.': ''})|replace({',': '.'})|number_format(4, '', '') -%}\r\n  {{ value|number_format(2, '.', '') }}\r\n{%- endmacro %}\r\n\r\n  <Header>\r\n    <Myndighed>{{ _self.cvr(handler.settings.sender.sender_id) }}</Myndighed>\r\n    <ModtagetDato>{{ _self.date(submission.completed) }}</ModtagetDato>\r\n    <KLE>{{ handler.settings.distribution_context.kle_emne }}</KLE>\r\n    {% for file in files.dokumenter_overslag|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Overslag</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n    {% for file in files.dokumenter_faktura|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Faktura</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n    {% for file in files.dokumenter_bilag|default([]) %}\r\n    <Dokumenter>\r\n      <Dokumentnavn>{{ file.sftp_filename }}</Dokumentnavn>\r\n      <Dokumenttype>Bilag</Dokumenttype>\r\n    </Dokumenter>\r\n    {% endfor %}\r\n  </Header>\r\n\r\n  <AnsoegerOplysninger>\r\n    <Ansoeger>\r\n      <Fornavn>{{ submission.data.ansoegeroplysninger_ansoeger_fornavn|trim }}</Fornavn>\r\n      {% if submission.data.ansoegeroplysninger_ansoeger_mellemnavn|default(false) %}\r\n      <Mellemnavn>{{ submission.data.ansoegeroplysninger_ansoeger_mellemnavn|trim }}</Mellemnavn>\r\n      {% endif %}\r\n      <Efternavn>{{ submission.data.ansoegeroplysninger_ansoeger_efternavn|trim }}</Efternavn>\r\n      <Personnummer>{{ _self.personnummer(submission.data.ansoegeroplysninger_ansoeger_personnummer_cpr_) }}</Personnummer>\r\n      {% if submission.data.ansoegeroplysninger_ansoeger_telefonnummer|default(false) %}\r\n      <Telefonnummer>{{ _self.telefonnummer(submission.data.ansoegeroplysninger_ansoeger_telefonnummer) }}</Telefonnummer>\r\n      {% endif %}\r\n    </Ansoeger>\r\n  </AnsoegerOplysninger>\r\n\r\n  {% if submission.data.sygeforsikring == 'Ja' %}\r\n  <Sygeforsikring>\r\n    <Gruppe>{{ submission.data.sygeforsikring_gruppe }}</Gruppe>\r\n  </Sygeforsikring>\r\n  {% endif %}\r\n\r\n  <Erklaering>Accepteret</Erklaering>\r\n\r\n  <Underskriftsoplysninger>\r\n    <Underskrift>{{ submission.data.ansoegeroplysninger_ansoeger_fornavn|trim }}{% if submission.data.ansoegeroplysninger_ansoeger_mellemnavn|default(false) %} {{ submission.data.ansoegeroplysninger_ansoeger_mellemnavn|trim }}{% endif %} {{ submission.data.ansoegeroplysninger_ansoeger_efternavn|trim }}</Underskrift>\r\n    <Underskriftsdato>{{ _self.date(submission.data.underskriftsoplysninger_underskriftsdato) }}</Underskriftsdato>\r\n  </Underskriftsoplysninger>\r\n\r\n  {% if submission.data.fuldmagt == 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger' %}\r\n  <Fuldmagt>\r\n    <FuldmagtDokumentnavn>{{ submission.data.fuldmagt_for_og_mellemnavn_e1|trim }} {{ submission.data.fuldmagt_efternavn|trim }}</FuldmagtDokumentnavn>\r\n    <FuldmagthaversPersonnummer>{{ _self.personnummer(submission.data.fuldmagt_undertegnedepersonnummer) }}</FuldmagthaversPersonnummer>\r\n  </Fuldmagt>\r\n  {% endif %}\r\n\r\n</SP241>\r\n"
