id: ansoegning_om_helbredstillaeg_sp
title: 'Ansøgning om helbredstillæg - SP241'
description: '<p><strong>Beskrivelse:</strong>&nbsp;Her kan du ansøge om helbredstillæg. Helbredstillæg er et særligt tilskud til folkepensionister og førtidspensionister tilkendt pension efter reglerne fra før 2003 med begrænsede indtægter ved siden af pensionen og med begrænset formue.<br>&nbsp;<br><strong>Ejer:</strong>&nbsp;<br>&nbsp;<br><strong>Afdeling:</strong>&nbsp;Pension<br><br><strong>Postkasse:&nbsp;</strong><a href="mailto:pension@msb.aarhus.dk"><strong>pension@msb.aarhus.dk</strong></a><br>&nbsp;<br><strong>Direkte link:</strong>&nbsp;<br>&nbsp;<br><strong>Shortlink:</strong>&nbsp;<br>&nbsp;<br><strong>Henvisninger:&nbsp; </strong>SP241&nbsp;<br><br><strong>Sprog:</strong> Dansk</p>'
categories:
  - Ekstern
  - Fordelingskomponent
  - KP
  - Test
elements: "info:\n  '#type': webform_wizard_page\n  '#title': Info\n  ansoegeroplysninger:\n    '#type': webform_section\n    '#title': 'Dine oplysninger '\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    ansoeger:\n      '#type': fieldset\n      '#title': Oplysninger\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      '#format': container\n      ansoegeroplysninger_ansoeger_fornavn:\n        '#type': os2forms_nemid_first_name\n        '#title': Fornavn\n        '#multiple': false\n        '#readonly': true\n        '#required': true\n      ansoegeroplysninger_ansoeger_mellemnavn:\n        '#type': os2forms_nemid_middle_name\n        '#title': Mellemnavn\n        '#multiple': false\n        '#readonly': true\n      ansoegeroplysninger_ansoeger_efternavn:\n        '#type': os2forms_nemid_last_name\n        '#title': Efternavn\n        '#multiple': false\n        '#readonly': true\n        '#required': true\n      ansoegeroplysninger_ansoeger_personnummer_cpr_:\n        '#type': os2forms_nemid_cpr\n        '#title': 'CPR nummer'\n        '#multiple': false\n        '#readonly': true\n        '#required': true\n      ansoegeroplysninger_ansoeger_telefonnummer:\n        '#type': textfield\n        '#title': Telefonnummer\n        '#pattern': \\d+\n        '#prepopulate': true\n      markup_01:\n        '#type': webform_markup\n        '#markup': '<h3>Info</h3><p>Du skal anvende denne selvbetjeningsløsning til at søge om almindelig helbredstillæg.</p><p><strong>Læs mere</strong><br>Du kan læse mere om lovgrundlag, klagevejledning og generel information om helbredstillæg på <a href=\"https://www.borger.dk/pension-og-efterloen/tillaeg-til-folke--og-foertidspension/Helbredstillaeg\" target=\"_blank\">borger.dk</a> (nyt vindue).<br><br><strong>VIGTIGT!</strong><br>Du skal oplyse din formue til Udbetaling Danmark, før din ansøgning om helbredstillæg er færdiggjort.<br><br>Oplysning om din formue skal ske via Udbetaling Danmark''s <a href=\"https://www.borger.dk/Handlingsside?selfserviceId=df161e6a-b52f-4dfd-b875-3fe42132f4cb\" target=\"_blank\">selvbetjeningsløsning </a>(åbner i nyt vindue)<br><br>Når du har gennemført denne selvbetjeningsløsning, vil ovenstående link til Udbetaling Danmark igen, fremkomme.</p>'\n      vejledning_om_helbredstillaeg_kan_foldes_ud:\n        '#type': details\n        '#title': 'Vejledning om helbredstillæg (Kan foldes ud)'\n        '#description': '<p><strong>Helbredstillæg</strong><br>Er du folkepensionist eller har du fået tilkendt førtidspension efter reglerne før 2003, kan du søge om helbredstillæg. Du skal ansøge om helbredstillæg på Borger.dk, eller du kan – hvis du er undtaget for digital selvbetjening udfylde denne blanket og fremsende en del til kommunen, og den anden til Udbetaling Danmark. Husk at skrive under både på ansøgningen og på formueskemaet.<br>Kommunen kan bevilge helbredstillæg til helbredsbetingede udgifter, når du også får tilskud efter sundhedsloven (visse typer lægemidler og visse behandlinger og udgifter til tandlæge, fodterapeut, fysioterapeut, kiropraktor og psykolog). En bevilling af almindeligt helbredstillæg gælder et &nbsp;kalenderår ad gangen.<br>&nbsp;</p><p><strong>Helbredstillæg er afhængig af din indkomst og din</strong><br><strong>formue</strong></p><p>Din indkomst er opgjort af Udbetaling Danmark og er omregnet til din personlige tillægsprocent. Din personlige tillægsprocent skal være større end 0, for at du kan få helbredstillæg.<br>Din og din ægtefælles/samlevers likvide formue skal være under 103.100 kr. (2025-sats), for at du kan få helbredstillæg. Likvid formue er værdien af forskellige værdipapirer (aktier og obligationer og tilsvarende), indestående i banken og dine kontanter.</p><p>Når du ansøger om helbredstillæg vil Udbetaling Danmark registrere din og din ægtefælles/samlevers aktuelle likvide formue ud fra din opgørelse på skemaet ”Pension – Formueskema – Oplysninger om formue, som du skal sende til Udbetaling Danmark. Herefter vil Udbetaling Danmark fremsende oplysninger om din formue og din personlige tillægsprocent til kommunen. Kommunen vil derefter træffe afgørelse om helbredstillæg.</p><p><strong>Hvad kan jeg få i helbredstillæg?</strong><br>Helbredstillægget er på 85% af din udgift til medicin og visse undersøgelser og behandlinger. Til medicin beregnes de 85% af den billigste tilsvarende medicin, uanset hvilken medicin du køber. Hvis du kun kan anvende en bestemt slags medicin, der ikke er den billigste, så skal din læge søge om særligt tilskud til dig. Betaling for behandlinger følger de priser, der er aftalt mellem behandlerne og det offentlige.</p><p>Er din personlige tillægsprocent mindre end 100, nedsættes helbredstillægget med tillægsprocenten.<br>&nbsp;</p><p><strong>Tilskudskort</strong><br>Når kommunen har beregnet dit helbredstillæg, får du tilsendt en bevilling, hvor det står, hvad kommunen dækker. Denne kan du vise på apoteket eller din behandler, hvis de ikke allerede ved det i forvejen.</p><p>Når du køber lægemidler på apoteket, er kommunens andel fratrukket. Hos behandlere er du nødt til at spørge, om de afregner hos kommunen. Hvis behandleren ikke afregner direkte med kommunen, så skal du betale selv og derefter henvende dig til kommunen for at få dit tilskud.</p><p><br><strong>Kan jeg få anden hjælp som pensionist?</strong><br><strong>Briller, tandprotese eller fodbehandling</strong><br>Kommunen kan bevilge udvidet helbredstillæg til briller, tandproteser og fodbehandlinger. Det udvidede helbredstillæg skal du ansøge om hver gang, og inden du begynder behandlingen - altså inden du bestiller brillerne, får taget mål til tandprotesen eller begynder at få fodbehandling. Du må gerne tale med optikeren, tandlægen og fodbehandleren om, hvad det er, du har brug for.</p><p><strong>Personligt tillæg</strong><br>Kommunen kan yde personligt tillæg til andre nødvendige og rimelige udgifter, som du ikke selv kan betale.<br>Hvis du ikke selv kan betale din egen andel af de udgifter, der er omfattet af helbredstillægget, kan du også søge disse udgifter dækket.<br>For at få personligt tillæg, skal du være særligt vanskeligt stillet økonomisk.</p><p><strong>Varmetillæg</strong><br>Din personlige tillægsprocent skal være større end 0, for at du kan få varmetillæg. Du skal ansøge Udbetaling Danmark om varmetillæg. Ansøgningen skal ske digitalt via borger.dk.</p><p><br><strong>Ændringer i din økonomi</strong><br>Vær også opmærksom på, at du skal fortælle Udbetaling Danmark, hvis dine indtægter, formue og personlige forhold har ændret sig, siden du ansøgte om pension eller øvrige pensionsydelser eller siden sidste opgørelse fra Udbetaling Danmark ved årsskiftet. Du skal ændre den indkomst, som du betaler skat af, via forskudsregistrering på SKAT.dk. Øvrige ændringer meddeles digitalt til Udbetaling Danmark på Borger.dk. Hvis du ikke kan betjene dig selv digitalt, skal du henvende dig til din kommunes borgerservice. Ændringer i indkomst, formue og personlige forhold kan medføre, at din folkepension og øvrige pensionsydelser skal ændres.<br>&nbsp;</p><p><strong>Registrerede oplysninger</strong><br>Kommunen registrerer de modtagne oplysninger og videregiver oplysningerne til Udbetaling Danmark og andre offentlige myndigheder, private virksomheder m.fl., der har lovmæssigt krav på oplysningerne eller samarbejder med kommunen.<br>Kommunen kan videregive oplysning om tilskuddets størrelse til behandleren.<br>Du har ret til at få at vide, hvilke oplysninger kommunen behandler om dig. Du kan kræve forkerte oplysninger rettet.</p><p><br><strong>Yderligere information og vejledning</strong><br>Det er muligt at søge yderligere information om pension og øvrige pensionsydelser på www.borger.dk.<br>Hvis du har brug personlig vejledning eller hjælp til digital selvbetjening skal du henvende dig til Udbetaling Danmark, hvis det drejer sig om folkepension, selve udbetalingen af din førtidspension, personlig tillægsprocent, formueopgørelse, varmetillæg og ældrecheck (se hvordan på Borger.dk).<br>Hvis du har brug for personlig hjælp og rådgivning eller<br>yderligere vejledning til førtidspension, helbredstillæg og personligt tillæg, skal du henvende dig i kommunens borgerservice.</p>'\n      lovstof_kan_foldes_ud:\n        '#type': details\n        '#title': 'Lovstof (Kan foldes ud)'\n        '#description': '<p>Du bedes udfylde formularen, for at kommunen kan behandle din henvendelse på et fyldestgørende grundlag, jf. retssikkerhedslovens § 11, stk. 1.<br>Dine oplysninger om Samlivsforhold og Aktuel formue fremsendes til Udbetaling Danmark, da det er Udbetaling Danmark, der skal opgøre din likvide formue.<br>Efter retssikkerhedslovens § 11, stk. 2, har du pligt til<br>straks at underrette kommunen om enhver ændring i dine personlige og økonomiske forhold, som kan medføre en ændring af helbredstillægget. Du kan vælge at oplyse om ændringerne via Udbetaling Danmarks digitale løsning på Borger.dk.<br>Forkerte eller manglende oplysninger kan medføre, at kommunen rejser krav om tilbagebetaling, jf. pensionslovens § 42 eller førtidspensionslovens § 42.<br>Hvis du giver forkerte, mangelfulde eller vildledende oplysninger – enten bevidst eller ved grov uagtsomhed – kan du blive idømt bøde efter retssikkerhedslovens § 12b eller tiltales efter straffelovens § 289a.</p><p><br><strong>Oplysninger kommunen kan indhente uden dit samtykke</strong><br>Kommunen kan indhente økonomiske oplysninger samt oplysninger om dine ferieforhold fra<br>• andre offentlige myndigheder,<br>• eIndkomstregistret,<br>• A-kasser og<br>• Feriekonto.<br>Kommunen kan indhente tilsvarende oplysninger om andre i din husstand.<br>Kommunen bruger oplysningerne til behandling af din sag eller til efterfølgende kontrol (jf. retssikkerhedslovens § 11a, stk. 2, 4 og 5.<br>Kommunen har adgang til Udbetaling Danmarks oplysninger om dine og din ægtefælle/samlevers indtægt, personlig tillægsprocent og formue som er nødvendige for beregningen af helbredstillæg og personligt tillæg, jf. lov om Udbetaling Danmark, § 8, stk. 2.<br>Til kontrol af din indkomst- og formueforhold kan kommunen kræve nødvendige oplysninger fra pengeinstitutter og arbejdsgivere. Oplysningerne kan sammenstilles med de øvrige oplysninger om dine økonomiske forhold, som kommunen er i besiddelse af, jf. retssikkerhedslovens § 11a, stk. 3.</p><p><br><strong>Kommunens registrering og videregivelse af oplysninger</strong><br>Kommunen registrerer de modtagne oplysninger og videregiver oplysningerne til andre offentlige myndigheder, private virksomheder m.fl., der har lovmæssigt krav på oplysningerne eller samarbejder med kommunen.<br>Kommunen sletter oplysningerne når opbevaringspligten udløber og et eventuelt arkiveringskrav er opfyldt. Når oplysningerne er arkiveret eller slettet, har kommunen ikke længere adgang til dem.&nbsp;</p><p>Du har ret til at vide, hvilke oplysninger kommunen har om dig, og du kan kræve forkerte oplysninger rettet eller slettet.</p><p><br><strong>Kommunens databeskyttelsesrådgiver</strong><br>Du kan kontakte databeskyttelsesrådgiveren om dine rettigheder i henhold til databeskyttelseslovgivningen.<br>Du har ret til at klage til Datatilsynet over Kommunens behandling af dine personlige oplysninger.<br>På Datatilsynet.dk kan du læse mere om databeskyttelsesrådgiverens rolle</p>'\nhvem_udfylder_ansoegningen:\n  '#type': webform_wizard_page\n  '#title': 'Hvem udfylder ansøgningen'\n  hvem_udfylder_ansoegningen1:\n    '#type': webform_section\n    '#title': 'Hvem udfylder ansøgningen'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    hvem_udfylder_ansoegningen2:\n      '#type': fieldset\n      '#title': 'Hvem udfylder ansøgningen'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_02:\n        '#type': webform_markup\n        '#markup': '<h2>Hvem udfylder ansøgningen</h2>'\n      fuldmagt:\n        '#type': radios\n        '#title': 'Jeg udfylder ansøgningen som'\n        '#options':\n          'Ansøger, der ønsker at lave en ansøgning om udvidet helbredstillæg': 'Ansøger, der ønsker at lave en ansøgning om udvidet helbredstillæg'\n          'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger': 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n        '#required': true\n    fuldmagt_i_forbindelse_med_ansoegning_om_helbredstillaeg_og_per2:\n      '#type': fieldset\n      '#title': 'Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg'\n      '#title_display': invisible\n      '#states':\n        visible:\n          ':input[name=\"fuldmagt\"]':\n            value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_03:\n        '#type': webform_markup\n        '#markup': '<h3>Fuldmagt i forbindelse med ansøgning om helbredstillæg og personligt tillæg</h3><p>Det er et krav, at der er udarbejdet og vedhæftet en fuldmagt til ansøgningen.<br><br>Ved at udfylde og underskrive en begrænset fuldmagt, giver ansøgeren en partsrepræsentant (f.eks. en pårørende eller ven) tilladelse til at hjælpe med ansøgningen, men ikke automatisk fuldmagt til efterfølgende at handle på ansøgers vegne i den efterfølgende sagsbehandling. Det kræver en fuldmagt uden begrænsninger og ønskes dette, skal du kontakte kommunen, for yderligere information om denne mulighed.</p>'\n      markup_12:\n        '#type': webform_markup\n        '#markup': '<h5>&nbsp;</h5><h5>Undertegnede</h5>'\n      fuldmagt_for_og_mellemnavn_e1:\n        '#type': textfield\n        '#title': 'For- og mellemnavn(e)'\n        '#required': true\n      fuldmagt_efternavn:\n        '#type': textfield\n        '#title': Efternavn\n        '#required': true\n      fuldmagt_undertegnedepersonnummer:\n        '#type': textfield\n        '#title': Personnummer\n        '#required': true\n      vejnavn2:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n      husnummer2:\n        '#type': textfield\n        '#title': Husnummer\n        '#required': true\n      etage2:\n        '#type': textfield\n        '#title': Etage\n      side_doer2:\n        '#type': textfield\n        '#title': Side/Dør\n      postnummer2:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n      by2:\n        '#type': textfield\n        '#title': By\n        '#required': true\n      markup_13:\n        '#type': webform_markup\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n        '#markup': '<h3>&nbsp;</h3><h3>Giver med min underskrift begrænset fuldmagt til person</h3>'\n      fuldmagt_fuldmagtdokumentnavn:\n        '#type': textfield\n        '#title': 'Fulde navn'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n      fuldmagt_fuldmagthaverspersonnummer:\n        '#type': textfield\n        '#title': Personnummer\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n        '#required': true\n      vejnavn3:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n      husnummer3:\n        '#type': textfield\n        '#title': Husnummer\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n      etage3:\n        '#type': textfield\n        '#title': Etage\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n      side_doer3:\n        '#type': textfield\n        '#title': Side/Dør\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n      postnummer3:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n      by3:\n        '#type': textfield\n        '#title': By\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"giver_med_min_underskrift_begraenset_fuldmagt_til[Person]\"]':\n              checked: true\n      markup_17:\n        '#type': webform_markup\n        '#markup': '<p><strong>Erklæring</strong></p>'\n      partsrepraesentant_erklaering:\n        '#type': checkbox\n        '#title': 'Som partsrepræsentant erklærer jeg, at der foreligger en underskrevet fuldmagt med korrekte oplysninger'\n        '#required': true\n        '#states':\n          visible:\n            ':input[name=\"jeg_udfylder_anmodningen_som\"]':\n              value: 'Privatperson, der med en fuldmagt udfylder og signerer på vegne af ansøger'\n      markup_15:\n        '#type': webform_markup\n        '#markup': '<h3>Fuldmagtens omfang</h3><p>Fuldmagten giver tilladelse til, at partsrepræsentanten må hjælpe mig med at få udfyldt, signeret (med partsrepræsentants MitID) og indsendt:</p>'\n      ansoegning_om:\n        '#type': radios\n        '#title': 'Ansøgning om'\n        '#title_display': invisible\n        '#options':\n          'Ansøgning om Helbredstillæg': 'Ansøgning om Helbredstillæg'\n          'Ansøgning om Udvidet Helbredstillæg': 'Ansøgning om Udvidet Helbredstillæg'\n          'Ansøgning om Personligt tillæg': 'Ansøgning om Personligt tillæg'\n          'Anmodning om refusion i forbindelse med udgifter til behandling': 'Anmodning om refusion i forbindelse med udgifter til behandling'\n        '#required': true\n      markup_16:\n        '#type': webform_markup\n        '#markup': '<p>Denne fuldmagt er begrænset og er ikke en tilladelse til at handle på mine vegne i den efterfølgende sagsbehandling og dialog med kommunen.&nbsp;</p><h3>Ikrafttrædelse og tilbagekaldelse</h3><p>Fuldmagten gælder fra den dato, jeg har underskrevet, og dækker alene den konkrete tilhørende ansøgning/anmodning.</p>'\n      fuldmagt_dato:\n        '#type': date\n        '#title': Dato\n        '#required': true\n      fuldmagt_underskrift:\n        '#type': webform_signature\n        '#title': Underskrift\n        '#description': '<p>Skriv under med mus, eller finger.</p><p>Brug gendan knappen for at rydde og starte forfra.</p>'\n        '#description_display': before\n        '#required': true\noplysninger_om_ansoeger:\n  '#type': webform_wizard_page\n  '#title': 'Oplysninger om ansøger'\n  oplysninger_om_ansoeger1:\n    '#type': webform_section\n    '#title': 'Oplysninger om ansøger'\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    oplysninger_om_ansoeger2:\n      '#type': fieldset\n      '#title': 'Oplysninger om ansøger'\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_07:\n        '#type': webform_markup\n        '#markup': '<h3>Oplysninger om ansøger</h3>'\n      jeg_har_ikke_adresse_i_danmark:\n        '#type': checkbox\n        '#title': 'Jeg har ikke adresse i Danmark'\n      vejnavn:\n        '#type': textfield\n        '#title': Vejnavn\n        '#required': true\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      husnummer:\n        '#type': textfield\n        '#title': Husnummer\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n        '#required': true\n      etage:\n        '#type': textfield\n        '#title': Etage\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      side_doer:\n        '#type': textfield\n        '#title': Side/Dør\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      postnummer:\n        '#type': textfield\n        '#title': Postnummer\n        '#required': true\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      by:\n        '#type': textfield\n        '#title': By\n        '#states':\n          invisible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_1:\n        '#type': textfield\n        '#title': 'Adresselinje 1'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_2:\n        '#type': textfield\n        '#title': 'Adresselinje 2'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_3:\n        '#type': textfield\n        '#title': 'Adresselinje 3'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_4:\n        '#type': textfield\n        '#title': 'Adresselinje 4'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      adresselinje_5:\n        '#type': textfield\n        '#title': 'Adresselinje 5'\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n      telefonnummer:\n        '#type': textfield\n        '#title': Telefonnummer\n      du_er_registreret_med_en_udenlandsk_adresse_og_du_skal_derfor_be:\n        '#type': fieldset\n        '#title': 'Du er registreret med en udenlandsk adresse, og du skal derfor benytte Anmodning om refusion i forbindelse med udgifter til behandling via Udbetaling Danmark. Du finder Udbetaling Danmark og yderligere vejledning på borger.dk (nyt vindue). Er du imidlertid flyttet til en dansk kommune, skal du rette dine adresseoplysninger og fortsætte med ansøgningen.'\n        '#title_display': invisible\n        '#states':\n          visible:\n            ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n              checked: true\n        '#attributes':\n          style: 'background: #FFEECC; padding: 25px;max-width: 500px;'\n        markup_04:\n          '#type': webform_markup\n          '#markup': '<p>Du er registreret med en udenlandsk adresse, og du skal derfor benytte Anmodning om refusion i forbindelse med udgifter til behandling via Udbetaling Danmark. Du finder Udbetaling Danmark og yderligere vejledning på <a href=\"http://www.borger.dk/\" target=\"_blank\">borger.dk</a> (nyt vindue). Er du imidlertid flyttet til en dansk kommune, skal du rette dine adresseoplysninger og fortsætte med ansøgningen.</p>'\nside:\n  '#type': webform_wizard_page\n  '#title': 'Medlem af sygeforsikring'\n  sektion:\n    '#type': webform_section\n    '#title': sektion\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    feltgruppe:\n      '#type': fieldset\n      '#title': feltgruppe\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_18:\n        '#type': webform_markup\n        '#markup': '<h2>Medlem af sygeforsikring</h2><h5>Sygeforsikring \"danmark\"</h5><p>Er du i tvivl om hvilken gruppe, du tilhører, kan du finde oplysningerne ved at logge på <a href=\"https://www.dit-danmark.dk/\" target=\"_blank\">dit-danmark.dk</a> (nyt vindue).<br>&nbsp;</p>'\n      sygeforsikring:\n        '#type': radios\n        '#title': 'Er du medlem af Sygeforsikringen \"danmark\" '\n        '#options': yes_no\n        '#required': true\n      sygeforsikring_gruppe:\n        '#type': select\n        '#title': Gruppe\n        '#options':\n          GRUPPE_1: 'Gruppe 1'\n          GRUPPE_2: 'Gruppe 2'\n          GRUPPE_5: 'Gruppe 5'\n          GRUPPE_E: 'Gruppe E'\n          GRUPPE_N: 'Gruppe N'\n          GRUPPE_S: 'Gruppe S'\n          GRUPPE_BASIS: Basis\n        '#states':\n          visible:\n            ':input[name=\"sygeforsikring\"]':\n              value: Ja\nside1:\n  '#type': webform_wizard_page\n  '#title': 'Erklæring og underskrift'\n  sektion1:\n    '#type': webform_section\n    '#title': Erklæring\n    '#title_display': invisible\n    '#attributes':\n      style: 'background: #E5F5E0; padding: 25px;  '\n    feltgruppe1:\n      '#type': fieldset\n      '#title': Erklæring\n      '#title_display': invisible\n      '#attributes':\n        style: 'background: #F7FCF5; padding: 25px; '\n      markup_19:\n        '#type': webform_markup\n        '#markup': '<h3>Erklæring og underskrift</h3><p>Inden at du på næste side underskriver og indsender ansøgningen, skal du på denne side erklære dig enig i de lovmæssige forudsætninger for at ansøge om helbredstillæg.</p>'\n      erklaering:\n        '#type': checkbox\n        '#title': 'Jeg kender mine rettigheder og pligter som angivet i afsnittet om behandling af personoplysninger og i vejledningen.'\n        '#required': true\n      markup_20:\n        '#type': webform_markup\n        '#markup': '<p><a href=\"https://www2.borgeronline.dk/Guide/Index/84e93c13-bb37-4d25-a46b-a7fff64ed701#\">Se afsnittet om behandling af personoplysninger og vejledningen her</a><br>&nbsp;</p><p>Ved at fortsætte erklærer jeg hermed, at jeg har læst og forstået de lovmæssige forudsætninger for at ansøge om helbredstillæg.</p>'\n      underskriftsoplysninger_underskrift:\n        '#type': webform_signature\n        '#title': Underskrift\n        '#description': '<p>Skriv under med mus, eller finger.</p><p>Brug gendan knappen for at rydde og starte forfra.</p>'\n        '#description_display': before\n        '#required': true\n      underskriftsoplysninger_underskriftsdato:\n        '#type': date\n        '#title': Dato\n        '#required': true\nkvittering:\n  '#type': os2forms_attachment\n  '#title': Kvittering\n  '#export_type': pdf\n  '#excluded_elements': {  }\n  '#exclude_empty': 0\n  '#exclude_empty_checkbox': 0\nactions:\n  '#type': webform_actions\n  '#title': 'Send knap(per)'\n  '#states':\n    disabled:\n      ':input[name=\"jeg_har_ikke_adresse_i_danmark\"]':\n        checked: true"
