os2forms_selvbetjening_overview.elements:
  path: "/admin/os2forms_selvbetjening_overview/elements"
  defaults:
    _form: '\Drupal\os2forms_selvbetjening_overview\Form\ElementsForm'
    _title: "Elements"
  requirements:
    _permission: "access webform overview"
  options:
    no_cache: TRUE

