  defaults:
    _form: '\Drupal\os2forms_selvbetjening_overview\Form\HandlersForm'
    _title: "Handlers"
  requirements:
    _permission: "access webform overview"
  options:
    no_cache: TRUE

os2forms_selvbetjening_overview.webforms:
  path: "/admin/os2forms_selvbetjening_overview/webforms"
  defaults:
    _form: '\Drupal\os2forms_selvbetjening_overview\Form\WebformsForm'
    _title: "Webforms"
  requirements:
    _permission: "access webform overview"
  options:
    no_cache: TRUE

os2forms_selvbetjening_overview.taxonomies:
  path: "/admin/os2forms_selvbetjening_overview/taxonomies"
  defaults:
    _form: '\Drupal\os2forms_selvbetjening_overview\Form\TaxonomyForm'
    _title: "Taxonomies"
  requirements:
    _permission: "access deprecation taxonomy overview"
