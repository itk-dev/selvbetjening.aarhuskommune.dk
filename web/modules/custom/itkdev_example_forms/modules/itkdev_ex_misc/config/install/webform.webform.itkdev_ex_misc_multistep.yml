id: itkdev_ex_misc_multistep
title: "Multistep wizard form"
description: "Example of a multi-step wizard form with 7 pages demonstrating various field types"
categories: {}
elements: |-
  page_personal:
    '#type': webform_wizard_page
    '#title': 'Personlige oplysninger'
    name:
      '#type': textfield
      '#title': Navn
      '#required': true
    email:
      '#type': email
      '#title': Email
      '#placeholder': 'user@example.com'
      '#required': true
    phone:
      '#type': tel
      '#title': Telefon
      '#placeholder': '+45 12345678'
  page_address:
    '#type': webform_wizard_page
    '#title': Adresse
    street:
      '#type': textfield
      '#title': Vejnavn
    house_number:
      '#type': textfield
      '#title': Husnummer
    postal_code:
      '#type': textfield
      '#title': Postnummer
    city:
      '#type': textfield
      '#title': By
  page_employment:
    '#type': webform_wizard_page
    '#title': "Beskæftigelse og uddannelse"
    employment_status:
      '#type': select
      '#title': "Beskæftigelse"
      '#options':
        employed: Ansat
        self_employed: Selvstændig
        unemployed: Ledig
        student: Studerende
        retired: Pensioneret
    employer:
      '#type': textfield
      '#title': Arbejdsgiver
    job_title:
      '#type': textfield
      '#title': Jobtitel
    start_date:
      '#type': date
      '#title': Startdato
    education_level:
      '#type': select
      '#title': Uddannelsesniveau
      '#options':
        primary: Grundskole
        secondary: Gymnasium
        vocational: Erhvervsuddannelse
        bachelor: Bachelor
        master: Kandidat
        phd: Ph.d.
    education_institution:
      '#type': textfield
      '#title': Uddannelsessted
    education_name:
      '#type': textfield
      '#title': Uddannelse
    work_experience_years:
      '#type': number
      '#title': "Erhvervserfaring i år"
      '#min': 0
      '#max': 50
      '#step': 1
  page_preferences:
    '#type': webform_wizard_page
    '#title': "Præferencer"
    preferred_contact:
      '#type': radios
      '#title': 'Foretrukken kontaktform'
      '#options':
        email_contact: Email
        phone_contact: Telefon
        sms_contact: SMS
    interests:
      '#type': checkboxes
      '#title': Interesser
      '#options':
        sport: Sport
        music: Musik
        technology: Teknologi
        art: Kunst
        nature: Natur
  page_inquiry:
    '#type': webform_wizard_page
    '#title': 'Detaljer om henvendelse'
    inquiry_type:
      '#type': select
      '#title': 'Type af henvendelse'
      '#options':
        question: "Spørgsmål"
        complaint: Klage
        suggestion: Forslag
        feedback: Feedback
        other: Andet
    subject:
      '#type': textfield
      '#title': Emne
      '#required': true
    description:
      '#type': textarea
      '#title': Beskrivelse
      '#rows': 5
    priority:
      '#type': radios
      '#title': Prioritet
      '#options':
        low: Lav
        medium: Mellem
        high: "Høj"
    desired_date:
      '#type': date
      '#title': "Ønsket dato"
    desired_time:
      '#type': webform_time
      '#title': "Ønsket tidspunkt"
      '#time_format': 'H:i'
    preferred_department:
      '#type': select
      '#title': 'Foretrukken afdeling'
      '#options':
        customer_service: Kundeservice
        technical: Teknisk
        sales: Salg
        management: Ledelse
    reference_number:
      '#type': textfield
      '#title': Referencenummer
    attachment:
      '#type': managed_file
      '#title': "Vedhæft fil"
      '#file_extensions': 'txt pdf doc docx'
      '#max_filesize': '10'
  page_additional:
    '#type': webform_wizard_page
    '#title': 'Yderligere information'
    service_rating:
      '#type': webform_rating
      '#title': 'Tilfredshed med service'
      '#star_size': medium
    recommendation_likelihood:
      '#type': webform_scale
      '#title': 'Sandsynlighed for anbefaling'
      '#min': 1
      '#max': 10
      '#min_text': 'Slet ikke sandsynligt'
      '#max_text': 'Meget sandsynligt'
    experience_evaluation:
      '#type': webform_likert
      '#title': 'Vurdering af oplevelse'
      '#questions':
        q1: 'Servicen var hurtig'
        q2: 'Personalet var venligt'
        q3: 'Problemet blev løst'
      '#answers':
        1: 'Meget uenig'
        2: Uenig
        3: Neutral
        4: Enig
        5: 'Meget enig'
    comments:
      '#type': textarea
      '#title': Kommentarer
      '#rows': 3
    visited_before:
      '#type': radios
      '#title': "Har du besøgt os før?"
      '#options':
        yes: Ja
        no: Nej
    visit_count:
      '#type': number
      '#title': "Antal besøg"
      '#min': 0
      '#max': 100
      '#step': 1
    heard_about_us:
      '#type': select
      '#title': "Hvordan hørte du om os?"
      '#options':
        search: "Søgemaskine"
        social_media: Sociale medier
        friend: Ven eller familie
        advertisement: Reklame
        other: Andet
    preferred_communication:
      '#type': webform_select_other
      '#title': 'Foretrukken kommunikation'
      '#options':
        email_comm: Email
        phone_comm: Telefon
        letter: Brev
      '#other__placeholder': 'Angiv anden'
    available_days:
      '#type': checkboxes
      '#title': "Tilgængelige dage"
      '#options':
        monday: Mandag
        tuesday: Tirsdag
        wednesday: Onsdag
        thursday: Torsdag
        friday: Fredag
    budget:
      '#type': range
      '#title': Budget
      '#min': 0
      '#max': 10000
      '#step': 500
      '#output': right
      '#output__field_suffix': ' DKK'
  page_confirmation:
    '#type': webform_wizard_page
    '#title': "Bekræftelse"
    accept_terms:
      '#type': checkbox
      '#title': "Jeg accepterer vilkårene"
      '#required': true
    terms_of_service:
      '#type': webform_terms_of_service
      '#title': "Servicevilkår"
      '#terms_type': modal
      '#terms_content': "Dette er eksempel på servicevilkår. Ved at acceptere erklærer du dig enig i disse vilkår."
    signature:
      '#type': webform_signature
      '#title': Underskrift
