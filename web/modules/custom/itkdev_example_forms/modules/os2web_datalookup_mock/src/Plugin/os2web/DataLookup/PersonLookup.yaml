"1111110000":
  persondata:
    status:
      # @see https://rimi-itk.github.io/digitaliseringskataloget.dk/digitaliseringskataloget.dk/sf1520/4.0/PersonBaseDataExtendedService/xsd/PersonBaseDataExtendedServiceTypes.xsd
      status: "01"
    navn:
      personadresseringsnavn: "Mother X 62"
      fornavn: "Mother"
      mellemnavn: "X"
      efternavn: "62"
    foedselsdato:
      # Y-m-dP
      dato: "1981-12-13+01:00"
    tilmeldtDigitalpost: true
    adressebeskyttelse:
      # beskyttet: true
    statsborgerskab:
      # https://symfony.com/doc/current/components/yaml.html#parsing-php-constants
      landekode: !php/const \Drupal\os2web_datalookup\Plugin\os2web\DataLookup\ServiceplatformenCPRExtended::DENMARK_COUNTRY_CODE
      statsborgerskabDato:
        # https://www.php.net/manual/en/datetime.constants.php#constant.date-rfc3339-extended
        dato: "2001-01-01T00:00:00.000+02:00"
  adresse:
    aktuelAdresse:
      vejnavn: Livets Landevej
      husnummer:
      etage:
      sidedoer:
      postnummer:
      postdistrikt:
      kommunekode:
  relationer:
    barn:
      - personnummer: "1111110010"
      - personnummer: "1111110020"
    foraeldremyndighed:

