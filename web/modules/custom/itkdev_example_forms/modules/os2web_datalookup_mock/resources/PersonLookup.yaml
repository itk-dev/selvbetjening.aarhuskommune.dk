#     1111110010 -->|mor| 1111110000
#     1111110020 -->|mor| 1111110000
#     1111110010 -->|far| 1111110001

#     1111110000 -->|barn| 1111110010
#     1111110000 -->|barn| 1111110020
#     1111110001 -->|barn| 111111001

# Map from CPR (PNR) to person data.
#
# Persons with persondata.status.status in (1, 3, 5, 7) will be used to define mock OIDC
# users (cf. ../../../../../../../docker-compose.oidc.yml). Run
#
#   docker compose restart idp-citizen-generate-user-claims idp-citizen
#
# to reload OIDC mock users after changing this file.

"1111110000":
  persondata:
    status:
      # https://rimi-itk.github.io/digitaliseringskataloget.dk/digitaliseringskataloget.dk/sf1520/4.0/PersonBaseDataExtendedService/xsd/PersonBaseDataExtendedServiceTypes.xsd
      # Status attribute:
      # 1 = Aktiv, bopæl i dansk folkeregister
      # 3 = Aktiv, speciel vejkode (9900 - 9999) i dansk folkeregister
      # 5 = Aktiv, bopæl i grønlandsk folkeregister
      # 7 = Aktiv, speciel vejkode (9900 - 9999) i grønlandsk folkeregister
      # 20 = Inaktiv, uden bopæl i dansk/grønlandsk folkeregister men tildelt personnummer af skattehensyn (kommunekoderne 0010, 0011, 0012 og 0019)
      # 30 = Inaktiv, anulleret personnummer 50 = Inaktiv, slettet personnummer ved dobbeltnummer
      # 60 = Inaktiv, ændret personnummer ved ændring af fødselsdato og køn CPR Centrale Personregister Side 8 af 53
      # 70 = Inaktiv, forsvundet
      # 80 = Inaktiv, udrejst
      # 90 = Inaktiv, død
      status: 1
    navn:
      personadresseringsnavn: "Augusta Dalgaard Ipsen"
      fornavn: Augusta
      mellemnavn: Dalgaard
      efternavn: Ipsen
    foedselsdato:
      # Y-m-dP
      dato: "1981-12-13+01:00"
    tilmeldtDigitalpost: true
    adressebeskyttelse:
      # beskyttet: true
    statsborgerskab:
      # https://symfony.com/doc/current/components/yaml.html#parsing-php-constants
      landekode: !php/const \Drupal\os2web_datalookup\Plugin\os2web\DataLookup\ServiceplatformenCPRExtended::DENMARK_COUNTRY_CODE
      statsborgerskabDato:
        # https://www.php.net/manual/en/datetime.constants.php#constant.date-rfc3339-extended
        dato: "2001-01-01T00:00:00.000+02:00"
  adresse:
    aktuelAdresse:
      vejnavn: Livets Landevej
      husnummer:
      etage:
      sidedoer:
      postnummer:
      postdistrikt:
      kommunekode:
  relationer:
    barn:
      - personnummer: "1111110010"
      - personnummer: "1111110020"
    foraeldremyndighed:

