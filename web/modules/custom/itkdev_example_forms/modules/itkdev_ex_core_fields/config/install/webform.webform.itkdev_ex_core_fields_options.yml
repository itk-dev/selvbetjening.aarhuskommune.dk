id: itkdev_ex_core_fields_options
title: "Option and selection elements"
description: "Examples of option-based elements: dropdowns, radios, checkboxes, likert scales and taxonomy term selectors"
categories: {}
elements: |-
  example_select:
    '#type': select
    '#title': Select
    '#options':
      option_a: 'Option A'
      option_b: 'Option B'
      option_c: 'Option C'
  example_radios:
    '#type': radios
    '#title': Radios
    '#options':
      yes: 'Yes'
      no: 'No'
      maybe: Maybe
  example_checkbox:
    '#type': checkbox
    '#title': 'Single checkbox'
  example_checkboxes:
    '#type': checkboxes
    '#title': Checkboxes
    '#options':
      red: Red
      green: Green
      blue: Blue
  example_select_other:
    '#type': webform_select_other
    '#title': 'Select (with other)'
    '#options':
      cat: Cat
      dog: Dog
    '#other__placeholder': 'Specify other'
  example_radios_other:
    '#type': webform_radios_other
    '#title': 'Radios (with other)'
    '#options':
      morning: Morning
      afternoon: Afternoon
      evening: Evening
    '#other__placeholder': 'Specify other'
  example_checkboxes_other:
    '#type': webform_checkboxes_other
    '#title': 'Checkboxes (with other)'
    '#options':
      email_contact: Email
      phone_contact: Phone
      sms_contact: SMS
    '#other__placeholder': 'Specify other'
  example_tableselect:
    '#type': tableselect
    '#title': 'Table select'
    '#options':
      row_1:
        column_1: 'Row 1, Col 1'
        column_2: 'Row 1, Col 2'
      row_2:
        column_1: 'Row 2, Col 1'
        column_2: 'Row 2, Col 2'
  example_likert:
    '#type': webform_likert
    '#title': Likert
    '#questions':
      q1: 'The service was fast'
      q2: 'The staff was helpful'
      q3: 'The quality was good'
    '#answers':
      1: 'Strongly disagree'
      2: Disagree
      3: Neutral
      4: Agree
      5: 'Strongly agree'
  example_term_select:
    '#type': webform_term_select
    '#title': 'Taxonomy term select'
    '#vocabulary': tags
  example_term_checkboxes:
    '#type': webform_term_checkboxes
    '#title': 'Taxonomy term checkboxes'
    '#vocabulary': tags
